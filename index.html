<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FIRE Calculator — Malaysia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#EDEAE2; --panel:#F7F4EC; --panel-2:#FFFFFF; --panel-3:#E7E2D3;
    --line:#DBD5C5; --paper:#1E2A17; --muted:#6E7260;
    --gold:#8A5A1A; --teal:#4A6320; --teal-dim:#3A4E19; --danger:#A83A31; --good:#276B43;
    --forest:#17220B;
    --good-onforest:#5FC080; --gold-onforest:#E0A845; --danger-onforest:#F0776C;
    /* type scale: 11/12/13/14/16/19/24 — Space Grotesk = headings/verdict, IBM Plex Mono = tabular/data, Inter = body/labels */
  }
  
  /* Custom scrollbar for bounded table */
  .table-scroll.table-scroll-bounded::-webkit-scrollbar { width:8px; height:8px; }
  .table-scroll.table-scroll-bounded::-webkit-scrollbar-track { background:transparent; }
  .table-scroll.table-scroll-bounded::-webkit-scrollbar-thumb { background:rgba(120,120,120,0.45); border-radius:999px; }
  .table-scroll.table-scroll-bounded::-webkit-scrollbar-thumb:hover { background:rgba(120,120,120,0.7); }
  .table-scroll.table-scroll-bounded::-webkit-scrollbar-corner { background:transparent; }
  
  *{box-sizing:border-box;}
  body{margin:0; background:var(--ink); color:var(--paper); font-family:'Inter',sans-serif; font-size:14px; -webkit-font-smoothing:antialiased; overflow-x:hidden;}
  h1,h2,h3{font-family:'Space Grotesk',sans-serif; margin:0;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  a{color:var(--teal);}

  /* top bar */
  .topbar{position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:12px; padding:12px 16px; background:var(--panel-2); border-bottom:1px solid var(--line);}
  .hamburger{background:transparent; border:1px solid var(--line); border-radius:8px; width:40px; height:40px; padding:0; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; transition:border-color .15s, background .15s;}
  .hamburger:hover{border-color:var(--muted); background:var(--panel-2);}
  .hamburger span{display:block; width:16px; height:2px; background:var(--paper); position:relative;}
  .hamburger span::before,.hamburger span::after{content:""; position:absolute; width:16px; height:2px; background:var(--paper); left:0;}
  .hamburger span::before{top:-5px;} .hamburger span::after{top:5px;}
  .topbar h1{font-size:16px; font-weight:600; white-space:nowrap;}
  #valueModeBtn{font-size:12px; padding:0 10px;}
  @media(max-width:420px){ .topbar h1{display:none;} }
  .topbar .view-label{margin-left:8px; font-family:'IBM Plex Mono',monospace; font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:30vw; padding:4px 10px; border:1px solid var(--line); border-radius:20px; display:none;}
  .topbar .view-label.show{display:inline-block;}

  /* drawer */
  .backdrop{position:fixed; inset:0; background:rgba(10,10,11,0.7); backdrop-filter:blur(2px); z-index:29; opacity:0; pointer-events:none; transition:opacity .2s;}
  .backdrop.open{opacity:1; pointer-events:auto;}

  /* in-app modal (replaces native confirm/alert, which sandboxed previews block) */
  .modal-backdrop{position:fixed; inset:0; background:rgba(10,10,11,0.75); backdrop-filter:blur(2px); z-index:49; opacity:0; pointer-events:none; transition:opacity .15s;}
  .modal-backdrop.open{opacity:1; pointer-events:auto;}
  .modal-box{position:fixed; top:50%; left:50%; transform:translate(-50%,-50%) scale(0.96); width:min(380px, calc(100vw - 40px)); background:var(--panel-2); border:1px solid var(--line); border-radius:14px; padding:22px; z-index:50; opacity:0; pointer-events:none; transition:opacity .15s, transform .15s; box-shadow:0 20px 50px rgba(0,0,0,0.5);}
  .modal-box.open{opacity:1; pointer-events:auto; transform:translate(-50%,-50%) scale(1);}
  .modal-msg{font-size:14px; line-height:1.6; margin-bottom:18px; color:var(--paper);}
  .modal-actions{display:flex; justify-content:flex-end; gap:8px;}
  .drawer{position:fixed; top:0; left:0; bottom:0; width:280px; max-width:84vw; background:var(--panel); border-right:1px solid var(--line); z-index:30; transform:translateX(-100%); transition:transform .22s cubic-bezier(.2,.8,.2,1); display:flex; flex-direction:column; padding:calc(14px + env(safe-area-inset-top)) 0 calc(14px + env(safe-area-inset-bottom));}
  .drawer.open{transform:translateX(0);}
  .drawer .dhead{display:flex; align-items:center; justify-content:space-between; padding:4px 12px 16px 20px; border-bottom:1px solid var(--line); margin-bottom:10px;}
  .drawer .dhead h2{font-size:16px; letter-spacing:0.01em;}
  .drawer-close{background:transparent; border:1px solid var(--line); border-radius:8px; width:32px; height:32px; display:flex; align-items:center; justify-content:center; color:var(--muted); font-size:16px; line-height:1; cursor:pointer; padding:0; flex-shrink:0;}
  .drawer-close:hover{color:var(--paper); border-color:var(--muted);}
  .drawer-scroll{flex:1; overflow-y:auto; padding:4px 10px;}
  .navitem{display:flex; align-items:center; gap:12px; padding:12px 12px; cursor:pointer; color:var(--muted); font-size:14px; font-weight:500; border-radius:10px; margin-bottom:2px; min-height:48px; transition:background .12s, color .12s;}
  .navitem:hover{background:var(--panel-2); color:var(--paper);}
  .navitem.active{color:var(--paper); background:linear-gradient(90deg, rgba(74,99,32,0.14), rgba(74,99,32,0.03)); box-shadow:inset 3px 0 0 var(--teal);}
  .navitem .n-icon{width:18px; height:18px; flex-shrink:0; display:flex; align-items:center; justify-content:center; color:inherit; opacity:0.85;}
  .navitem .n-text{min-width:0;}
  .navitem .n-label{overflow-wrap:break-word;}
  .navitem .n-sub{font-size:11px; color:var(--muted); font-weight:400; margin-top:2px; overflow-wrap:break-word;}
  @media(min-width:900px){ .drawer{width:250px;} }

  .wrap{max-width:1220px; margin:0 auto; padding:24px 20px 80px;}
  :root{ --btn-h:40px; --btn-h-sm:32px; }
  button{font-family:'Inter',sans-serif; font-size:13px; font-weight:600; border:1px solid var(--line); background:var(--panel); color:var(--paper); padding:0 16px; height:var(--btn-h); border-radius:8px; cursor:pointer; transition:border-color .15s, background .15s; display:inline-flex; align-items:center; justify-content:center; line-height:1;}
  button:hover{border-color:var(--muted);}
  button.primary{background:var(--teal); border-color:var(--teal); color:#fff;}
  button.primary:hover{background:var(--teal-dim); border-color:var(--teal-dim);}
  button.ghost{background:transparent;}
  button.small{height:var(--btn-h-sm); padding:0 12px; font-size:12px;}
  button.danger-ghost{background:transparent; border-color:var(--danger); color:var(--danger);}
  button.danger-ghost:hover{background:var(--danger); color:var(--ink);}
  button:focus-visible, input:focus-visible, select:focus-visible{outline:2px solid var(--teal); outline-offset:1px;}
  button:disabled{opacity:0.4; cursor:not-allowed;}

  /* kebab menu (mobile action collapse) */
  .head-actions{position:relative; flex-shrink:0;}
  .action-set-desktop{display:flex; gap:8px; align-items:center;}
  .kebab-btn{display:none; width:var(--btn-h-sm); height:var(--btn-h-sm); padding:0; font-size:16px; flex-shrink:0;}
  @media(max-width:768px){
    .action-set-desktop{display:none;}
    .kebab-btn{display:inline-flex;}
    .plan-head{position:relative; flex-wrap:nowrap; padding-right:60px;}
    .plan-head .titles{min-width:0; flex:1 1 auto;}
    .plan-head .head-actions{position:absolute; top:16px; right:16px; margin:0;}
  }
  .kebab-menu{position:absolute; top:calc(100% + 6px); right:0; left:auto; max-width:calc(100vw - 40px); background:var(--panel-2); border:1px solid var(--line); border-radius:10px; min-width:190px; box-shadow:0 8px 24px rgba(0,0,0,0.45); z-index:15; padding:6px; display:none; flex-direction:column; gap:2px;}
  .kebab-menu.open{display:flex;}
  .kebab-menu button{background:transparent !important; border:none !important; color:var(--paper); justify-content:flex-start !important; width:100%; height:var(--btn-h); padding:0 10px; border-radius:8px; font-weight:500;}
  .kebab-menu button:hover{background:var(--panel-3) !important;}
  .kebab-menu button.danger-ghost{color:var(--danger);}
  .kebab-menu button.danger-ghost:hover{background:var(--danger) !important; color:var(--ink);}
  .kebab-menu .kebab-check{display:flex; align-items:center; gap:8px; padding:0 10px; height:var(--btn-h); font-size:13px; cursor:pointer;}

  /* mobile timeline stack */
  .timeline-stack{display:none; flex-direction:column; gap:8px; margin:10px 0;}
  .timeline-stack .ts-row{display:flex; align-items:center; gap:10px; padding:10px 12px; border:1px solid var(--line); border-radius:8px; background:var(--panel-3);}
  .timeline-stack .ts-dot{width:12px; height:12px; border-radius:3px; flex-shrink:0;}
  .timeline-stack .ts-label{font-weight:600; font-size:13px;}
  .timeline-stack .ts-range{margin-left:auto; font-family:'IBM Plex Mono',monospace; font-size:12px; color:var(--muted);}
  @media(max-width:768px){
    .timeline{display:none;}
    .timeline-stack{display:flex;}
  }

  /* wizard */
  .wiz-progress{display:flex; flex-wrap:wrap; margin:10px 0 18px;}
  .wiz-dot{width:32px; height:32px; border-radius:50%; border:1px solid var(--line); background:var(--panel); color:var(--muted); font-family:'IBM Plex Mono',monospace; font-size:12px; cursor:pointer; padding:0; display:inline-flex; align-items:center; justify-content:center; margin:0 10px 8px 0;}
  .wiz-dot.done{border-color:var(--teal); color:var(--teal);}
  .wiz-dot.active{background:var(--teal); border-color:var(--teal); color:#fff; font-weight:600;}
  .wiz-step-title{font-family:'Space Grotesk',sans-serif; font-size:20px; font-weight:600; margin-bottom:14px;}
  .wiz-body{background:var(--panel-2); border-radius:14px; padding:20px; margin-bottom:18px;}
  .wiz-q{margin-bottom:16px;}
  .wiz-q:last-child{margin-bottom:0;}
  .wiz-nav{display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .wiz-review-row{display:flex; justify-content:space-between; gap:16px; padding:10px 0; border-bottom:1px solid var(--line); font-size:13px;}
  .wiz-review-row:last-child{border-bottom:none;}
  .wiz-review-q{color:var(--muted); max-width:60%;}
  .wiz-review-a{text-align:right; font-weight:600;}

  .toolbar{display:flex; gap:10px; margin-bottom:20px; flex-wrap:wrap; align-items:center;}
  .back-link{display:inline-flex; align-items:center; gap:6px; color:var(--muted); font-size:13px; cursor:pointer; margin-bottom:8px;}
  .back-link:hover{color:var(--teal);}
  .breadcrumb{font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:10px;}
  .autosave-tag{font-size:11px; color:var(--muted); display:flex; align-items:center; gap:6px; margin-bottom:18px;}
  .autosave-tag .dot-save{width:6px; height:6px; border-radius:50%; background:var(--good); flex-shrink:0;}

  .plan{background:var(--panel-2); border-radius:14px; margin-bottom:22px; overflow:hidden; box-shadow:0 1px 0 rgba(0,0,0,0.04) inset;}
  .plan-head{display:flex; align-items:center; justify-content:space-between; padding:18px 22px; background:var(--panel); gap:12px; flex-wrap:wrap;}
  .plan-head .titles{display:flex; align-items:baseline; gap:10px; flex-wrap:wrap;}
  .plan-head .titles > *{min-width:0;}
  .plan-head h2{font-size:16px;}
  .badge{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.06em; text-transform:uppercase; padding:3px 8px; border-radius:20px; border:1px solid var(--line); color:var(--muted); overflow-wrap:break-word; word-break:break-word; max-width:100%;}
  .badge.status-achieved{color:var(--good); border-color:var(--good);}
  .badge.status-short{color:var(--danger); border-color:var(--danger);}
  .plan-head .head-actions{display:flex; gap:8px; align-items:center;}
  .plan-body{padding:20px;}

  .grid{display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:16px; min-width:0;}
  .grid.cols-3{grid-template-columns:repeat(3,minmax(0,1fr));}
  .grid.cols-2{grid-template-columns:repeat(2,minmax(0,1fr));}
  @media(max-width:900px){.grid,.grid.cols-3{grid-template-columns:repeat(2,minmax(0,1fr));}}
  @media(max-width:600px){.grid,.grid.cols-3,.grid.cols-2{grid-template-columns:minmax(0,1fr);}}
  .field{display:flex; flex-direction:column; gap:5px;}
  .field label{font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace; letter-spacing:0.02em;}
  .field .hint{font-size:12.5px; color:var(--muted); opacity:0.9; font-family:'Inter',sans-serif; line-height:1.5; margin-top:2px;}
  .field .err{font-size:11px; color:var(--danger); font-family:'Inter',sans-serif;}
  .field.has-error input, .field.has-error select{border-color:var(--danger);}
  .field input, .field select{background:var(--ink); border:1px solid var(--line); color:var(--paper); padding:9px 10px; border-radius:8px; font-size:13px; font-family:'IBM Plex Mono',monospace; width:100%; transition:border-color .15s;}
  .field input:hover, .field select:hover{border-color:#B8AF93;}
  .check-row{display:flex; align-items:center; gap:8px; font-size:13px; color:var(--paper);}

  /* modern checkbox, applies everywhere (Compare tab, kebab menu, goal toggle) */
  input[type="checkbox"]{
    appearance:none; -webkit-appearance:none; margin:0; flex-shrink:0;
    width:18px; height:18px; border:1.5px solid var(--line); border-radius:5px;
    background:var(--ink); cursor:pointer; position:relative;
    transition:background .15s, border-color .15s;
  }
  input[type="checkbox"]:hover{border-color:var(--muted);}
  input[type="checkbox"]:checked{background:var(--teal); border-color:var(--teal);}
  input[type="checkbox"]:checked::after{
    content:""; position:absolute; left:5px; top:1px; width:5px; height:9px;
    border:solid #fff; border-width:0 2px 2px 0; transform:rotate(45deg);
  }
  .fire-desc{font-size:12px; color:var(--muted); margin:6px 0 4px; line-height:1.5;}
  .fx-fresh{font-size:11px; color:var(--muted); margin-top:6px;}
  .fx-fresh.stale{color:var(--danger);}

  .section-label{font-family:'IBM Plex Mono',monospace; font-size:11px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); margin:24px 0 12px; display:flex; align-items:center; gap:8px;}
  .section-label:first-child{margin-top:0;}
  .section-label::after{content:""; flex:1; height:1px; background:var(--line);}

  .scenario-pair{display:grid; grid-template-columns:1fr 1fr; gap:16px;}
  @media(max-width:760px){.scenario-pair{grid-template-columns:1fr;}}
  .dot{width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px;}
  .dot.normal{background:var(--teal);} .dot.cons{background:var(--gold);}

  .timeline{display:flex; height:26px; border-radius:5px; overflow:hidden; margin:10px 0; border:1px solid var(--line);}
  .timeline div{display:flex; align-items:center; justify-content:center; font-size:10px; font-family:'IBM Plex Mono',monospace; letter-spacing:0.04em; color:var(--ink); font-weight:600;}
  .phase-accum{background:var(--teal);} .phase-bridge{background:var(--danger); color:var(--paper) !important;} .phase-decum{background:var(--gold);}

  table{width:100%; border-collapse:collapse; margin-top:8px;}
  th,td{text-align:right; padding:8px 10px; font-size:12.5px; border-bottom:1px solid var(--line); white-space:nowrap;}
  th:first-child, td:first-child{text-align:left;}
  th{color:var(--muted); font-weight:500; font-size:11px; letter-spacing:0.03em; text-transform:uppercase; font-family:'Inter',sans-serif;}
  th.grp-normal{color:var(--teal); border-bottom:2px solid var(--teal);}
  th.grp-cons{color:var(--gold); border-bottom:2px solid var(--gold);}
  tr.milestone-key td{background:rgba(217,164,65,0.07);}
  tr.milestone-start td{background:rgba(0,0,0,0.035); font-style:italic; color:var(--muted);}
  tr.milestone-start td.mono{font-style:normal;}
  tr.milestone-fail td{color:var(--danger);}
  .table-scroll{overflow-x:auto;}
  .table-scroll-bounded{max-height:65vh; overflow:auto; border:1px solid var(--line); border-radius:8px; overscroll-behavior:contain; -webkit-overflow-scrolling:touch;}
  .table-scroll-bounded table{border-collapse:separate; border-spacing:0; margin-top:0;}
  .table-scroll-bounded th.col-age, .table-scroll-bounded td.col-age{position:sticky; left:0; z-index:3; background:var(--panel-2); width:74px; min-width:74px; max-width:74px; white-space:normal; box-shadow:2px 0 6px rgba(0,0,0,0.35); transform:translateZ(0);}
  .table-scroll-bounded tbody td.col-age{background:var(--panel-3);}
  .table-scroll-bounded tr.milestone-key td.col-age{background:#F1E6C8;}
  .table-scroll-bounded thead th{position:sticky; z-index:4; background:var(--panel-2); transform:translateZ(0); will-change:transform; backface-visibility:hidden;}
  .table-scroll-bounded thead tr:first-child th{top:0;}
  .table-scroll-bounded thead tr:not(:first-child):last-child th{top:var(--mt-row1-h, 42px);}
  .table-scroll-bounded thead th.col-age{z-index:8;}
  tr.milestone-fail-cons td{color:var(--gold);}
  .scroll-hint{display:none; text-align:center; font-size:11px; color:var(--muted); padding:6px 0 0; opacity:0.7;}
  @media(max-width:760px){.scroll-hint.show{display:block;}}

  .summary-cards{display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); gap:12px; margin-bottom:6px; min-width:0;}
  @media(max-width:900px){.summary-cards{grid-template-columns:repeat(2,minmax(0,1fr));}}
  @media(max-width:600px){.summary-cards{grid-template-columns:minmax(0,1fr);}}
  .scard{background:var(--panel-3); border-radius:12px; padding:16px; min-width:0; overflow-wrap:break-word; word-break:break-word;}
  .scard .lbl{font-size:11px; color:var(--muted); font-family:'IBM Plex Mono',monospace; text-transform:uppercase; letter-spacing:0.06em; margin-bottom:6px; overflow-wrap:break-word; word-break:break-word;}
  .scard .val{font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:600; overflow-wrap:break-word; word-break:break-word;}
  .scard .sub{font-size:11px; color:var(--muted); margin-top:4px; overflow-wrap:break-word; word-break:break-word;}
  .scard.verdict{grid-column:1 / -1; display:flex; align-items:center; justify-content:space-between; background:var(--forest); color:#EDEAE2; padding:22px 24px; border-radius:14px;}
  .scard.verdict .headline{font-family:'Space Grotesk',sans-serif; font-size:19px; font-weight:600; line-height:1.5; overflow-wrap:break-word; word-break:break-word;}

  .guidance{background:var(--panel-3); border-left:3px solid var(--gold); border-radius:6px; padding:14px 16px; margin-top:14px; font-size:13px; line-height:1.7;}
  .guidance b{color:var(--gold); font-family:'IBM Plex Mono',monospace;}

  .chart-wrap{position:relative; background:var(--panel-3); border:1px solid var(--line); border-radius:8px; padding:16px; margin-top:14px;}
  .legend{display:flex; gap:16px; font-size:11.5px; color:var(--muted); margin-bottom:10px; flex-wrap:wrap; align-items:center;}
  .legend span{display:flex; align-items:center; gap:6px;}
  .legend .sw{width:14px; height:3px; display:inline-block; border-radius:2px;}
  .legend .sw.dashed{background:none; border-top:2px dashed var(--muted); width:14px; height:0;}
  .legend .sw.goalline{background:none; border-top:2px dashed var(--danger); width:14px; height:0;}
  .chart-hint{font-size:11px; color:var(--muted); margin-left:auto; opacity:0.75;}
  .tooltip{position:absolute; pointer-events:none; background:var(--panel-2); border:1px solid var(--line); border-radius:8px; padding:12px 14px; font-family:'IBM Plex Mono',monospace; font-size:11.5px; line-height:1.7; white-space:nowrap; opacity:0; transition:opacity .1s; z-index:10; box-shadow:0 8px 24px rgba(0,0,0,0.4); max-width:80vw; overflow-x:auto;}
  .tooltip.pinned{pointer-events:auto;}
  .tooltip .t-age{font-family:'Space Grotesk',sans-serif; font-size:14px; margin-bottom:6px; color:var(--paper); display:flex; justify-content:space-between; gap:14px;}
  .tooltip .t-row{display:flex; justify-content:space-between; gap:18px;}
  .tooltip .t-phase{color:var(--muted); text-transform:capitalize;}
  .t-close{cursor:pointer; color:var(--muted); font-family:'Inter',sans-serif;}

  .adv-toggle{display:flex; align-items:center; gap:8px; margin-top:24px; cursor:pointer; user-select:none; font-size:13px; color:var(--muted);}
  .adv-toggle:hover{color:var(--paper);}
  .adv-toggle .chev{transition:transform .15s; display:inline-block;}
  .adv-toggle.open .chev{transform:rotate(90deg);}
  .adv-body{display:none; margin-top:14px; padding-top:6px;}
  .adv-body.open{display:block;}

  .asset-row, .phase-row{display:grid; grid-template-columns:1.4fr 0.8fr 1fr 1fr 1fr auto; gap:10px; align-items:start; margin-bottom:10px;}
  .phase-row{grid-template-columns:1fr 1fr 1fr auto;}
  .cb-row{display:grid; grid-template-columns:1fr 1fr 1.2fr 1.4fr auto; gap:10px; align-items:start; margin-bottom:10px;}

  @media(max-width:480px){.asset-row{grid-template-columns:1fr;} .phase-row{grid-template-columns:1fr;} .cb-row{grid-template-columns:1fr;}}
  .row-del{background:transparent; border:1px solid var(--line); color:var(--danger); border-radius:6px; padding:9px 10px; font-size:12px; height:38px; margin-top:22px;}

<body>

<div class="backdrop" id="backdrop"></div>
<div class="modal-backdrop" id="modalBackdrop"></div>
<div class="modal-box" id="modalBox"><div class="modal-msg" id="modalMsg"></div><div class="modal-actions" id="modalActions"></div></div>
<div class="drawer" id="drawer"></div>

<div class="topbar">
  <button class="hamburger" id="hamburgerBtn" aria-label="Menu"><span></span></button>
  <h1>FIRE Calculator</h1>
  <div class="view-label" id="viewLabel"></div>
  <button class="ghost small" id="fullNumBtn" style="margin-left:auto; white-space:nowrap; padding:0 10px;" aria-label="Toggle full or compact numbers"></button>
  <button class="ghost small" id="valueModeBtn" style="white-space:nowrap;"></button>
</div>

<div class="wrap" id="viewContainer"></div>

<footer>
  All figures are in today's MYR (real terms). Inputs are saved to this browser's local storage (IndexedDB) — nothing is sent anywhere. Calculated projections are never stored; they're recomputed each time you open the app. See <a href="#" data-view-link="help">How this is calculated</a> for the full formulas.
</footer>

<script>
/* ============================= IndexedDB layer ============================= */
const DB_NAME = 'fireCalcDB', DB_VERSION = 2;
let db = null;

function openDB(){
  return new Promise((resolve,reject) => {
    const req = indexedDB.open(DB_NAME, DB_VERSION);
    req.onupgradeneeded = e => {
      const d = e.target.result;
      if (d.objectStoreNames.contains('plans')) d.deleteObjectStore('plans');
      if (!d.objectStoreNames.contains('profiles')) d.createObjectStore('profiles', {keyPath:'id'});
      if (!d.objectStoreNames.contains('scenarios')) d.createObjectStore('scenarios', {keyPath:'id'});
      if (!d.objectStoreNames.contains('presets')) d.createObjectStore('presets', {keyPath:'name'});
      if (!d.objectStoreNames.contains('settings')) d.createObjectStore('settings', {keyPath:'id'});
    };
    req.onsuccess = e => resolve(e.target.result);
    req.onerror = e => reject(e.target.error);
  });
}
function txStore(store, mode){ return db.transaction(store, mode).objectStore(store); }
function dbGetAll(store){ return new Promise((res,rej) => { const r = txStore(store,'readonly').getAll(); r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error); }); }
function dbPut(store, val){ return new Promise((res,rej) => { const r = txStore(store,'readwrite').put(val); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }
function dbDelete(store, key){ return new Promise((res,rej) => { const r = txStore(store,'readwrite').delete(key); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }
function dbClear(store){ return new Promise((res,rej) => { const r = txStore(store,'readwrite').clear(); r.onsuccess=()=>res(); r.onerror=()=>rej(r.error); }); }

/* ============================= State ============================= */
let profiles = [];
let scenarios = [];
let presets = [];
let settings = {};
let currentView = 'dashboard';
let dashboardFilter = 'all';
let editingScenarioId = null;
let editingProfileId = null;
let comparePicked = [];
let wizardStep = 0;
let profileCounter = 0, scenarioCounter = 0, assetCounter = 0;

const SEED_PRESETS = [
  { name:'Lean',    swrNormal:6.25, swrCons:5.56, isCustom:false },
  { name:'Regular', swrNormal:4,    swrCons:3.57, isCustom:false },
  { name:'Fat',     swrNormal:3.33, swrCons:3.03, isCustom:false },
  { name:'Coast',   swrNormal:4,    swrCons:3.57, isCustom:false },
  { name:'Barista', swrNormal:5,    swrCons:4.35, isCustom:false },
];
const FIRE_DESCRIPTIONS = {
  Lean:    'Bare-bones budget, lowest multiple. You retire on less, so the pot needed is smaller.',
  Regular: 'The standard 4%-rule target — the common baseline most FIRE plans compare against.',
  Fat:     'A comfortable, higher-spending retirement. Needs the largest pot of the presets.',
  Coast:   'Stop contributing now and let today\'s balance grow untouched until it reaches the target on its own — you still work, just without saving more.',
  Barista: 'Retire early from full-time work, but keep light part-time income going to reduce how much the portfolio needs to cover.',
};
const SEED_SETTINGS = { id:'global', fxRate:4.20, inflationPct:3, rEquityNormal:10, rEquityCons:7, rEpfNormal:5.5, rEpfCons:4.5, investStdDev:15, epfStdDev:1.5 };
const CHART_PALETTE = ['#4A6320','#8A5A1A','#A83A31','#276B43','#3B6EA5','#B5651D','#967219'];

async function init(){
  db = await openDB();
  presets = await dbGetAll('presets');
  if (!presets.length){ for (const p of SEED_PRESETS) await dbPut('presets', p); presets = await dbGetAll('presets'); }
  for (const p of presets){
    if (p.swrNormal===undefined && p.multNormal!==undefined){
      p.swrNormal = Math.round((100/p.multNormal)*100)/100;
      p.swrCons = Math.round((100/p.multCons)*100)/100;
      delete p.multNormal; delete p.multCons;
      await dbPut('presets', p);
    }
  }
  let s = await dbGetAll('settings');
  if (!s.length){ await dbPut('settings', SEED_SETTINGS); s = [SEED_SETTINGS]; }
  settings = s[0];
  if (settings.inflationPct===undefined){ settings.inflationPct = 3; await dbPut('settings', settings); }
  if (settings.valueMode===undefined){ settings.valueMode = 'real'; await dbPut('settings', settings); }
  if (settings.fullNumbers===undefined){ settings.fullNumbers = false; await dbPut('settings', settings); }
  if (settings.investStdDev===undefined){ settings.investStdDev = 15; await dbPut('settings', settings); }
  if (settings.epfStdDev===undefined){ settings.epfStdDev = 1.5; await dbPut('settings', settings); }
  profiles = await dbGetAll('profiles');
  for (const p of profiles){
    if (p.planToAge===undefined) p.planToAge=90;
    if (p.salaryGrowthPct===undefined) p.salaryGrowthPct=0;
    if (!p.cashSavings) p.cashSavings=[];
    if (!p.investments) p.investments=[];
    p.investments.forEach(a => { if (a.returnOverrideCons===undefined) a.returnOverrideCons=null; });
    ensureWithdrawalOrder(p);
    if (p.salaryGrowthIsReal){
      // Reverting to nominal-input semantics — a "pay raise" is naturally the number on a payslip (nominal),
      // same as how investment/EPF/cash returns are entered. Converting the stored real value back to its
      // nominal equivalent keeps today's projected numbers unchanged; the field is Fisher-converted again
      // from here on, silently, the same way returns already are — no inflation math for the user to do.
      const realPct = p.salaryGrowthPct;
      const nominalPct = (((1+realPct/100)*(1+(settings.inflationPct||0)/100))-1)*100;
      p.salaryGrowthPct = Math.round(nominalPct*100)/100;
      delete p.salaryGrowthIsReal;
      await dbPut('profiles', p);
    }
  }
  scenarios = await dbGetAll('scenarios');
  scenarios.forEach(s => {
    if (s.lumpSums && !s.windfalls && !s.oneTimeCosts){
      s.windfalls = s.lumpSums.filter(l=>(l.amount||0)>=0).map(l=>({age:l.age, amount:l.amount||0, label:l.label||''}));
      s.oneTimeCosts = s.lumpSums.filter(l=>(l.amount||0)<0).map(l=>({age:l.age, amount:Math.abs(l.amount||0), label:l.label||''}));
      delete s.lumpSums;
    }
    if (!s.windfalls) s.windfalls=[];
    if (!s.oneTimeCosts) s.oneTimeCosts=[];
    if (!s.recurringTravel) s.recurringTravel = {enabled:false, amount:5000, startAge:null, endAge:null};
    if (!s.careerBreaks) s.careerBreaks = [];
    if (s.expenseDetailMode===undefined) s.expenseDetailMode = false;
    if (!s.expenseCategories) s.expenseCategories = [];
    if (s.swrNormal===undefined && s.multNormal!==undefined){
      s.swrNormal = Math.round((100/s.multNormal)*100)/100;
      s.swrCons = Math.round((100/s.multCons)*100)/100;
      delete s.multNormal; delete s.multCons;
    }
    if (s.monteCarloEnabled===undefined) s.monteCarloEnabled = false;
    if (s.monteCarloRuns===undefined) s.monteCarloRuns = 1000;
  });
  dashboardFilter = profiles.length>1 ? 'all' : (profiles[0] ? profiles[0].id : 'all');
  renderChrome();
  setView('dashboard');
}

const CASH_PRESETS = [
  { key:'cash', name:'Cash / Savings (no return)', hasReturn:false, defaultReturn:0 },
  { key:'fd', name:'Fixed Deposit (FD)', hasReturn:true, defaultReturn:3.5 },
  { key:'asb', name:'ASB / ASNB', hasReturn:true, defaultReturn:5 },
];
const INVESTMENT_PRESETS = [
  { key:'snp500', name:'S&P 500 (VOO/CSPX)', currency:'USD', defaultReturn:null },
  { key:'custom', name:'Custom investment', currency:'MYR', defaultReturn:null },
];

/* ---- withdrawal order: which bucket gets drawn down first, fully user-controlled & visible ---- */
function bucketReturnEstimate(a, kind){
  if (kind==='cash') return a.hasReturn ? (a.returnOverride||0) : 0;
  return (a.returnOverride!==null && a.returnOverride!==undefined && a.returnOverride!=='') ? parseFloat(a.returnOverride) : (settings.rEquityNormal||0);
}
function allBuckets(profile){
  const cash = (profile.cashSavings||[]).map(a=>({id:a.id, name:a.name, kind:'cash', returnPct:bucketReturnEstimate(a,'cash')}));
  const inv = (profile.investments||[]).map(a=>({id:a.id, name:a.name, kind:'investment', returnPct:bucketReturnEstimate(a,'investment')}));
  return [...cash, ...inv];
}
// Keeps profile.withdrawalOrder in sync with whatever buckets currently exist, without discarding
// the user's chosen order. New buckets are appended (lowest-return-first as a starting suggestion,
// never enforced); EPF is always present since it becomes drawable from age 55.
function ensureWithdrawalOrder(profile){
  const buckets = allBuckets(profile);
  const validIds = new Set([...buckets.map(b=>b.id), 'epf']);
  if (!profile.withdrawalOrder) profile.withdrawalOrder = [];
  let order = profile.withdrawalOrder.filter(id => validIds.has(id));
  const missing = [...validIds].filter(id => !order.includes(id));
  if (missing.length){
    missing.sort((a,b) => {
      if (a==='epf') return 1; if (b==='epf') return -1;
      const ba=buckets.find(x=>x.id===a), bb=buckets.find(x=>x.id===b);
      return (ba?ba.returnPct:0)-(bb?bb.returnPct:0);
    });
    order = [...order, ...missing];
  }
  profile.withdrawalOrder = order;
  return order;
}

function newProfile(name){
  profileCounter++; assetCounter++;
  return {
    id: 'pr'+Date.now()+profileCounter,
    name: name || ('Profile '+profileCounter),
    currentAge: 30,
    planToAge: 90,
    epfBalance: 80000, epfEmployeePct: 11, epfEmployerPct: 12, monthlySalary: 8000, salaryGrowthPct: 3,
    cashSavings: [],
    investments: [{ id:'a'+assetCounter, name:'S&P 500 (VOO/CSPX)', currency:'USD', balance:20000, monthlyContribution:3000, returnOverride:INVESTMENT_PRESETS.find(p=>p.key==='snp500').defaultReturn, returnOverrideCons:null }],
    fxRate: settings.fxRate, fxRateSetAt: new Date().toISOString(),
    withdrawalOrder: [],
  };
}
function newProfileBlank(name){
  profileCounter++; assetCounter++;
  return {
    id: 'pr'+Date.now()+profileCounter,
    name: name || ('Profile '+profileCounter),
    currentAge: 30,
    planToAge: 90,
    epfBalance: 0, epfEmployeePct: 11, epfEmployerPct: 12, monthlySalary: 0, salaryGrowthPct: 0,
    cashSavings: [],
    investments: [],
    fxRate: settings.fxRate, fxRateSetAt: new Date().toISOString(),
    withdrawalOrder: [],
  };
}
function newScenario(profile, fireType, name){
  scenarioCounter++;
  const preset = presets.find(p => p.name===fireType) || presets[0];
  const startAge = profile ? profile.currentAge : 30;
  return {
    id: 'sc'+Date.now()+scenarioCounter,
    profileId: profile ? profile.id : null,
    name: name || (fireType + ' scenario'),
    fireType: fireType,
    workingToAge: Math.max(startAge+1, 55),
    expensePhases: [{ age:startAge, monthlyExpense:4500, growthPct:0 }],
    expenseDetailMode: false,
    expenseCategories: [],
    incomePhases: [{ age:startAge, monthlyIncome:0, growthPct:0 }],
    baristaIncome: 2000, baristaFluctuation: 15, baristaEndAge: 65,
    rEquityNormal: settings.rEquityNormal, rEquityCons: settings.rEquityCons,
    rEpfNormal: settings.rEpfNormal, rEpfCons: settings.rEpfCons,
    swrNormal: preset.swrNormal, swrCons: preset.swrCons,
    goalEnabled: false, goalAmount: 2000000, goalAge: 50,
    windfalls: [],
    oneTimeCosts: [],
    recurringTravel: { enabled:false, amount:5000, startAge:null, endAge:null },
    careerBreaks: [],
    monteCarloEnabled: false, monteCarloRuns: 1000,
  };
}

async function saveProfile(p){ await dbPut('profiles', p); }
async function saveScenario(s){ await dbPut('scenarios', s); }

function fmt(n){ if (n===null||n===undefined||isNaN(n)) return '—'; const sign=n<0?'-':''; n=Math.abs(Math.round(n)); return sign+n.toLocaleString('en-MY'); }
/* Everything in this app is computed and stored in today's real MYR. toNominal() is a display-only
   transform — never used for target/shortfall/withdrawal logic — that shows what a real-terms figure
   would actually read as in future money, given the inflation preset, for a given age. */
function toNominal(realValue, age, currentAge){
  const inflation = (settings.inflationPct||0)/100;
  const years = Math.max(0, age-currentAge);
  return realValue*Math.pow(1+inflation, years);
}
/* Compact "today's / future" pair for table cells and tooltips. Real value leads (it's what drives
   every decision in the app); nominal trails, muted, as context for what that'll look like in the account. */
/* Large nominal figures over multi-decade horizons get unwieldy (correctly — that's what compounding
   does), so the future-MYR side compacts to M/B once it crosses 1 million, keeping it legible instead
   of a wall of digits. The real-terms figure — the one that actually drives every decision in the app —
   always stays in full precision. */
function fmtCompact(n){
  if (n===null||n===undefined||isNaN(n)) return '—';
  if (settings.fullNumbers) return fmt(n);
  const sign = n<0?'-':''; n=Math.abs(n);
  if (n>=1e9) return sign+(n/1e9).toFixed(2)+'B';
  if (n>=1e6) return sign+(n/1e6).toFixed(2)+'M';
  return fmt(n);
}
function isNominalMode(){ return settings.valueMode==='nominal'; }
/* Single source of truth for showing any money figure tied to a specific future age. Toggled globally
   (topbar switch) between two plain, mutually exclusive views — never both at once, to avoid the
   real/nominal-pair confusion this used to cause:
   - 'real'    (default): "purchasing power now" — what that future amount is worth in today's money.
   - 'nominal': "actual money then" — the literal amount that would be in the account / paid out that year. */
function dispVal(realValue, age, currentAge){
  return isNominalMode() ? fmtCompact(toNominal(realValue, age, currentAge)) : fmt(realValue);
}
function fmtDual(realValue, age, currentAge){ return dispVal(realValue, age, currentAge); }
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function daysSince(iso){ if (!iso) return null; const d=(Date.now()-new Date(iso).getTime())/86400000; return Math.round(d); }

/* ---- guardrails: keep every numeric input inside a range that can't break projection/charts ---- */
function clamp(v, min, max){ if (isNaN(v)) v=0; return Math.min(max, Math.max(min, v)); }
const FIELD_LIMITS = {
  currentAge:[16,100], planToAge:[17,120], workingToAge:[16,120],
  epfBalance:[0,100000000], monthlySalary:[0,1000000], epfEmployeePct:[0,100], epfEmployerPct:[0,100], salaryGrowthPct:[-20,20],
  fxRate:[0.01,50],
  monthlyExpense:[0,1000000], monthlyIncome:[0,1000000], growthPct:[-20,20], age:[16,120],
  baristaIncome:[0,1000000], baristaEndAge:[16,120], baristaFluctuation:[0,100],
  goalEnabled:null, goalAmount:[0,100000000], goalAge:[16,120],
  rEquityNormal:[-50,100], rEquityCons:[-50,100], rEpfNormal:[-50,100], rEpfCons:[-50,100],
  swrNormal:[0.5,20], swrCons:[0.5,20],
  inflationPct:[-20,50],
  investStdDev:[0,60], epfStdDev:[0,20], monteCarloRuns:[100,5000],
  balance:[0,100000000], monthlyContribution:[0,1000000], returnOverride:[-50,100],
  amount:[0,100000000], salaryDuringBreak:[0,1000000], reducedByPct:[0,100],
  name:null, currency:null, hasReturn:null, resumeAt:null, label:null,
};
function clampField(key, val){ const lim = FIELD_LIMITS[key]; return lim ? clamp(val, lim[0], lim[1]) : val; }

function phaseValueAt(phases, age, valKey){
  const sorted = [...phases].sort((a,b)=>a.age-b.age);
  if (!sorted.length) return 0;
  let active = sorted[0];
  for (const p of sorted){ if (p.age<=age) active=p; else break; }
  const growth = (active.growthPct||0)/100;
  const years = Math.max(0, age-active.age);
  return active[valKey]*Math.pow(1+growth, years);
}

/* ---- mortgage amortization (nominal terms; deflated to today's real MYR when consumed) ----
   Payment is the standard fixed-rate monthly amortization formula. An optional extra monthly
   overpayment accelerates payoff — the loan is simulated year-by-year (matching the app's annual
   projection granularity) to find the payoff age, rather than assuming the full nominal term. */
function mortgagePayment(principal, ratePct, termYears){
  const r = (ratePct||0)/100/12, n = Math.max(1,(termYears||1))*12;
  if (r===0) return (principal||0)/n;
  return (principal||0)*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
}
function mortgagePayoffAge(cat){
  const M = mortgagePayment(cat.principal, cat.ratePct, cat.termYears);
  const extra = Math.max(0, cat.extraMonthly||0);
  const annualPayment = (M+extra)*12;
  const annualRate = (cat.ratePct||0)/100;
  let balance = cat.principal||0;
  let years = 0;
  const cap = (cat.termYears||1)+1; // extra payments can only shorten the term, never lengthen it
  while (balance>0 && years<cap){
    const interest = balance*annualRate;
    const principalPaid = annualPayment-interest;
    if (principalPaid<=0) return (cat.startAge||0)+(cat.termYears||1); // payment doesn't cover interest — fall back to nominal term
    balance -= principalPaid;
    years++;
  }
  return (cat.startAge||0)+Math.max(1,years);
}
/* Real (today's MYR) monthly cash outflow for a single detailed-expense category at a given age. */
function categoryMonthlyAt(cat, age, profile, inflationPct){
  if (cat.type==='mortgage'){
    const payoffAge = mortgagePayoffAge(cat);
    if (age<cat.startAge || age>=payoffAge) return 0;
    const nominal = mortgagePayment(cat.principal, cat.ratePct, cat.termYears) + Math.max(0,cat.extraMonthly||0);
    const yearsFromToday = Math.max(0, age-profile.currentAge);
    return nominal/Math.pow(1+(inflationPct||0)/100, yearsFromToday);
  }
  // flat category
  if (age<cat.startAge || (cat.endAge!=null && cat.endAge!=='' && age>cat.endAge)) return 0;
  const growth = (cat.growthPct||0)/100;
  const years = Math.max(0, age-cat.startAge);
  return (cat.monthlyAmount||0)*Math.pow(1+growth, years);
}
function detailedMonthlyExpenseAt(scenario, profile, age, inflationPct){
  return (scenario.expenseCategories||[]).reduce((sum,cat) => sum+categoryMonthlyAt(cat, age, profile, inflationPct), 0);
}

/* ============================= Projection engine ============================= */
function toReal(nominalPct, inflationPct){
  const n=(nominalPct||0)/100, i=(inflationPct||0)/100;
  return (((1+n)/(1+i))-1)*100;
}
function realHint(nominalPct){
  const inflation = settings.inflationPct||0;
  const real = toReal(parseFloat(nominalPct)||0, inflation);
  return `Nominal — doesn't include inflation. Inflation preset (${inflation}%/yr) is applied automatically → ≈ ${real.toFixed(2)}% real`;
}
function swrHint(swrPct){
  const s = parseFloat(swrPct)||0;
  return s>0 ? `≈ ${(100/s).toFixed(1)}× your annual spend (multiple = 1 / SWR)` : 'Enter a rate above 0%';
}
/* A growth %/yr that looks small can still compound to something absurd over decades — this makes the
   effect visible right where the number is entered, rather than only showing up as a surprise later in
   the chart/table. */
function growthMultiplierHint(pct){
  const p = parseFloat(pct)||0;
  const mult10 = Math.pow(1+p/100, 10);
  const warn = Math.abs(p)>=15 ? ` ${ICON_WARN}unusually high to sustain for years — double-check this isn't a typo` : '';
  return `≈ ${mult10.toFixed(1)}× over 10 years${warn}`;
}

/* Auto-detected from the browser's clock every time projections run (never stored, so it's always
   "as of right now" — no staleness). EPF (and everything else) only actually grows/contributes for
   the months of the current calendar year that are still ahead of us, not a full 12 months, so the
   very first age-row in any projection was previously overstating growth by however much of this
   year has already passed. E.g. calculated in July: 12 - 7 = 5 months remain (Aug–Dec) this "year 1";
   every age-row after that is a genuine full calendar year, same as before. */
function firstYearRemainingInfo(){
  const now = new Date();
  const currentMonth = now.getMonth()+1; // 1-12
  const remainingMonths = 12 - currentMonth;
  return { fraction: remainingMonths/12, remainingMonths, currentMonth, year: now.getFullYear(), now };
}
function project(profile, scenario, growthScenario){
  const inflation = settings.inflationPct||0;
  const rEquityGlobal = toReal(growthScenario==='normal'?scenario.rEquityNormal:scenario.rEquityCons, inflation)/100;
  const rEpf = toReal(growthScenario==='normal'?scenario.rEpfNormal:scenario.rEpfCons, inflation)/100;
  const isCoast = scenario.fireType==='Coast';
  const isBarista = scenario.fireType==='Barista';
  const baristaFluct = growthScenario==='normal'?0:(scenario.baristaFluctuation/100);
  const baristaMonthlyEff = isBarista ? scenario.baristaIncome*(1-baristaFluct) : 0;
  const salaryGrowth = toReal(profile.salaryGrowthPct||0, inflation)/100;
  const withdrawalOrder = ensureWithdrawalOrder(profile);

  // Cash/savings and investments are tracked as separate buckets so withdrawals can drain
  // buckets in the exact order shown on the "Withdrawal order" profile step — never a hidden rule.
  const cashBuckets = (profile.cashSavings||[]).map(a => ({
    id:a.id, balance:a.balance||0, monthlyContribution:a.monthlyContribution||0,
    realReturn: a.hasReturn ? toReal(a.returnOverride||0, inflation)/100 : 0,
  }));
  const investBuckets = (profile.investments||[]).map(a => {
    const bal = a.currency==='USD' ? (a.balance||0)*profile.fxRate : (a.balance||0);
    const overrideRaw = growthScenario==='normal' ? a.returnOverride : a.returnOverrideCons;
    const r = (overrideRaw!==null && overrideRaw!==undefined && overrideRaw!=='') ? toReal(overrideRaw, inflation)/100 : rEquityGlobal;
    return { id:a.id, balance:bal, monthlyContribution:a.monthlyContribution||0, realReturn:r };
  });
  const nonEpfBuckets = [...cashBuckets, ...investBuckets];
  const invBalance0 = nonEpfBuckets.reduce((s,b)=>s+b.balance,0);
  const rInvest = invBalance0>0 ? nonEpfBuckets.reduce((s,b)=>s+b.balance*b.realReturn,0)/invBalance0 : rEquityGlobal;
  // Opening balances, captured before any year's growth/withdrawal — used only for the table's
  // synthetic "starting balance" row (built by the caller); project()'s own row series is unaffected.
  const openingBalances = { epf:profile.epfBalance, cash:cashBuckets.reduce((s,b)=>s+b.balance,0), invest:investBuckets.reduce((s,b)=>s+b.balance,0) };

  function drawFrom(pool, netW){
    // pool: array of {id, balance, realReturn} refs, mutated in place.
    // Drains strictly in the user's chosen withdrawalOrder (ties/unlisted ids fall back to lowest-return-first).
    // Returns unmet amount (0 if fully covered). Never lets a balance go negative.
    const orderIndex = new Map(withdrawalOrder.map((id,i)=>[id,i]));
    const seq = pool.slice().sort((a,b)=>{
      const ia = orderIndex.has(a.id) ? orderIndex.get(a.id) : Infinity;
      const ib = orderIndex.has(b.id) ? orderIndex.get(b.id) : Infinity;
      if (ia!==ib) return ia-ib;
      return a.realReturn-b.realReturn;
    });
    let remaining = netW;
    for (const b of seq){
      if (remaining<=0) break;
      const draw = Math.min(b.balance, remaining);
      b.balance -= draw; remaining -= draw;
    }
    return Math.max(remaining,0);
  }

  let epfBal = profile.epfBalance;
  let currentSalary = profile.monthlySalary;
  const rows = [];
  const startAge = profile.currentAge;
  const endAge = profile.planToAge || 90;
  const travelCfg = scenario.recurringTravel || {enabled:false};
  const firstYearMonths = firstYearRemainingInfo().remainingMonths; // months left in the current calendar year (growth window)
  // avgDivFactor(n): KWSP credits each month's contribution with dividend only from the FOLLOWING month
  // through 31 Dec — so across n contribution-months, the average dividend-earning fraction works out to a
  // clean (n-1)/24 (verified against a full month-by-month simulation of KWSP's own rule). The CURRENT
  // calendar month's contribution still happens (e.g. July's pay still goes in) — it just earns no dividend
  // that month, same as any other — so the contribution-month count for year 1 is firstYearMonths+1, one
  // more than the pure growth window used for the opening balance (which only grows for the months still ahead).
  const avgDivFactor = n => n>0 ? (n-1)/24 : 0;
  for (let age=startAge; age<=endAge; age++){
    const monthsThisYear = (age===startAge) ? firstYearMonths : 12; // opening-balance growth window
    const epfContribMonths = (age===startAge) ? firstYearMonths+1 : 12; // this month's EPF contribution still happens
    const yf = monthsThisYear/12; // prorate only the current, already-partly-elapsed year
    let phase;
    if (age<scenario.workingToAge && !isCoast) phase='accumulation';
    else if (age<55) phase='bridge';
    else phase='decumulation';

    (scenario.windfalls||[]).forEach(w => {
      if (w.age!==age) return;
      if (nonEpfBuckets.length){
        const orderedIds = withdrawalOrder.filter(id=>id!=='epf');
        const targetId = orderedIds.find(id=>nonEpfBuckets.some(b=>b.id===id)) || nonEpfBuckets[0].id;
        const bucket = nonEpfBuckets.find(b=>b.id===targetId) || nonEpfBuckets[0];
        bucket.balance += (w.amount||0);
      } else epfBal += (w.amount||0); // no non-EPF bucket exists to hold it; fall back to EPF rather than dropping it
    });

    const monthlyExpense = scenario.expenseDetailMode ? detailedMonthlyExpenseAt(scenario, profile, age, inflation) : phaseValueAt(scenario.expensePhases, age, 'monthlyExpense');
    const monthlyIncome = phaseValueAt(scenario.incomePhases, age, 'monthlyIncome');
    const annualExpense = monthlyExpense*12, annualOtherIncome = monthlyIncome*12;
    const swr = growthScenario==='normal'?scenario.swrNormal:scenario.swrCons;
    const multiple = swr>0 ? 100/swr : 25;
    const standardTarget = (annualExpense-annualOtherIncome)*multiple;
    const fireTarget = scenario.goalEnabled ? scenario.goalAmount : standardTarget;

    const oneTimeCostRow = (scenario.oneTimeCosts||[]).find(c=>c.age===age);
    const oneTimeCostAmt = oneTimeCostRow ? (oneTimeCostRow.amount||0) : 0;
    const travelActive = !!(travelCfg.enabled && age>=(travelCfg.startAge??startAge) && (travelCfg.endAge===null||travelCfg.endAge===undefined||travelCfg.endAge==='' || age<=travelCfg.endAge));
    const travelAmt = travelActive ? (travelCfg.amount||0) : 0;
    const oneOffTotal = oneTimeCostAmt + travelAmt; // one-off/annual costs layered on top of recurring living costs, doesn't distort the standard target

    // Withdrawal happens at the START of this age's year, drawn from the balance as it stood coming
    // into the year (post windfall, pre-growth) — never from a balance that's already grown. Growth is
    // then applied to whatever's left for the rest of the year. epf/cash/invest below are therefore
    // CLOSING (end-of-year) balances — what the row actually ends the year holding, after that year's
    // withdrawal and growth — not the opening balance the year started with.
    const row = { age, epf:0, cash:0, invest:0, combined:0, phase, monthlyExpense, monthlyIncome, standardTarget, fireTarget, shortfall:0, withdrawal:0, oneOffCost:oneOffTotal, epfLocked:phase==='bridge', careerBreak:false, salary:0 };
    rows.push(row);

    if (phase==='accumulation'){
      const activeBreak = (scenario.careerBreaks||[]).find(b => age>=b.startAge && age<b.endAge);
      const resumingBreak = (scenario.careerBreaks||[]).find(b => b.endAge===age);
      const salaryThisYear = activeBreak ? (activeBreak.salaryDuringBreak||0) : currentSalary;
      const annualEpfContribution = salaryThisYear*((profile.epfEmployeePct+profile.epfEmployerPct)/100)*epfContribMonths;
      row.careerBreak = !!activeBreak;
      row.salary = salaryThisYear;
      if (oneOffTotal>0){
        // EPF still locked pre-55 even during accumulation: one-off costs draw from non-EPF buckets only,
        // from the balance as it stood at the start of this year, before this year's growth/contribution.
        row.withdrawal = oneOffTotal;
        row.shortfall = drawFrom(nonEpfBuckets, oneOffTotal);
      }
      epfBal = epfBal*(1+rEpf*yf) + annualEpfContribution*(1+rEpf*avgDivFactor(epfContribMonths));
      nonEpfBuckets.forEach(b => { b.balance = b.balance*Math.pow(1+b.realReturn, yf) + (isCoast?0:b.monthlyContribution*12*yf); });
      if (activeBreak){
        // salary trajectory frozen at pre-break level for the duration of the break; no growth applied
      } else {
        if (resumingBreak && resumingBreak.resumeAt==='reduced') currentSalary *= (1-(resumingBreak.reducedByPct||0)/100);
        currentSalary *= Math.pow(1+salaryGrowth, yf);
      }
    } else if (phase==='bridge'){
      const baristaActive = isBarista && age<scenario.baristaEndAge;
      const netW = Math.max(annualExpense-annualOtherIncome-(baristaActive?baristaMonthlyEff*12:0),0)*yf + oneOffTotal;
      row.withdrawal = netW;
      row.shortfall = drawFrom(nonEpfBuckets, netW); // drawn from the start-of-year balance
      epfBal = epfBal*(1+rEpf*yf); // legally locked pre-55: cannot help cover a shortfall here
      nonEpfBuckets.forEach(b => { b.balance = b.balance*Math.pow(1+b.realReturn, yf); }); // grow what's left
    } else {
      const baristaActive = isBarista && age<scenario.baristaEndAge;
      const netW = Math.max(annualExpense-annualOtherIncome-(baristaActive?baristaMonthlyEff*12:0),0)*yf + oneOffTotal;
      row.withdrawal = netW;
      const epfRef = { id:'epf', balance:epfBal, realReturn:rEpf };
      row.shortfall = drawFrom([epfRef, ...nonEpfBuckets], netW); // drawn from start-of-year balances
      epfBal = epfRef.balance*(1+rEpf*yf); // grow what's left
      nonEpfBuckets.forEach(b => { b.balance = b.balance*Math.pow(1+b.realReturn, yf); });
    }

    row.epf = epfBal;
    row.cash = cashBuckets.reduce((s,b)=>s+b.balance,0);
    row.invest = investBuckets.reduce((s,b)=>s+b.balance,0);
    row.combined = row.epf+row.cash+row.invest;
  }

  let achievedAge=null;
  for (const r of rows){ if (r.combined>=r.fireTarget){ achievedAge=r.age; break; } }
  let depletionAge=null;
  for (const r of rows){ if (r.shortfall>0){ depletionAge=r.age; break; } }

  let goalCheck = null;
  if (scenario.goalEnabled){
    const rowAtGoalAge = rows.find(r => r.age===scenario.goalAge) || rows[rows.length-1];
    goalCheck = { age:scenario.goalAge, combined:rowAtGoalAge.combined, achieved:rowAtGoalAge.combined>=scenario.goalAmount, gap:scenario.goalAmount-rowAtGoalAge.combined };
  }

  return { rows, achievedAge, depletionAge, rInvest, goalCheck };
}

/* ============================= Monte Carlo (Advanced) ============================= */
/* Box-Muller transform — standard normal sample (mean 0, stddev 1), vanilla JS, no library. */
function sampleNormal(){
  let u=0, v=0;
  while (u===0) u=Math.random();
  while (v===0) v=Math.random();
  return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v);
}
/* Runs the plan `runs` times, each year sampling investment/EPF returns from a normal distribution
   (mean = the scenario's Normal-case assumption, stddev = the Presets & Defaults volatility) instead
   of using one fixed rate. Everything else (expense/income growth, career breaks, windfalls, one-off
   costs, withdrawal order, SWR target) stays exactly as entered — only return uncertainty is modelled.
   This is a stated simplification (see Help): returns are sampled as normal, not log-normal, and
   inflation itself is not randomized. Cash/FD/ASB accounts are treated as fixed (no volatility). */
function runMonteCarlo(profile, scenario, runs){
  const inflation = settings.inflationPct||0;
  const investStdDev = (settings.investStdDev||0)/100;
  const epfStdDev = (settings.epfStdDev||0)/100;
  const isCoast = scenario.fireType==='Coast';
  const isBarista = scenario.fireType==='Barista';
  const salaryGrowth = toReal(profile.salaryGrowthPct||0, inflation)/100;
  const startAge = profile.currentAge, endAge = profile.planToAge||90;
  const travelCfg = scenario.recurringTravel || {enabled:false};
  const firstYearMonths = firstYearRemainingInfo().remainingMonths;
  const avgDivFactor = n => n>0 ? (n-1)/24 : 0;
  const swr = scenario.swrNormal, multiple = swr>0 ? 100/swr : 25;

  const ages = []; for (let a=startAge; a<=endAge; a++) ages.push(a);
  const balancesByAge = ages.map(()=>[]); // combined pot per run, per age (for percentiles)
  let successCount = 0;

  for (let run=0; run<runs; run++){
    const withdrawalOrder = ensureWithdrawalOrder(profile);
    const cashBuckets = (profile.cashSavings||[]).map(a => ({
      id:a.id, balance:a.balance||0, monthlyContribution:a.monthlyContribution||0,
      meanReal: a.hasReturn ? toReal(a.returnOverride||0, inflation)/100 : 0,
    }));
    const investBuckets = (profile.investments||[]).map(a => {
      const bal = a.currency==='USD' ? (a.balance||0)*profile.fxRate : (a.balance||0);
      const overrideRaw = a.returnOverride;
      const meanNominal = (overrideRaw!==null && overrideRaw!==undefined && overrideRaw!=='') ? overrideRaw : scenario.rEquityNormal;
      return { id:a.id, balance:bal, monthlyContribution:a.monthlyContribution||0, meanNominal };
    });
    const nonEpfBuckets = [...cashBuckets, ...investBuckets];

    function drawFrom(pool, netW){
      const orderIndex = new Map(withdrawalOrder.map((id,i)=>[id,i]));
      const seq = pool.slice().sort((a,b)=>{
        const ia = orderIndex.has(a.id) ? orderIndex.get(a.id) : Infinity;
        const ib = orderIndex.has(b.id) ? orderIndex.get(b.id) : Infinity;
        return ia-ib;
      });
      let remaining = netW;
      for (const b of seq){ if (remaining<=0) break; const draw=Math.min(b.balance,remaining); b.balance-=draw; remaining-=draw; }
      return Math.max(remaining,0);
    }

    let epfBal = profile.epfBalance;
    let currentSalary = profile.monthlySalary;
    let everShort = false;
    let combinedSeries = [];

    for (let idx=0; idx<ages.length; idx++){
      const age = ages[idx];
      const monthsThisYear = (age===startAge) ? firstYearMonths : 12;
      const epfContribMonths = (age===startAge) ? firstYearMonths+1 : 12;
      const yf = monthsThisYear/12;
      let phase;
      if (age<scenario.workingToAge && !isCoast) phase='accumulation';
      else if (age<55) phase='bridge';
      else phase='decumulation';

      // sample this year's real returns for volatile buckets
      const rEpf = toReal(scenario.rEpfNormal + sampleNormal()*settings.epfStdDev, inflation)/100;
      investBuckets.forEach(b => { b.realReturn = toReal(b.meanNominal + sampleNormal()*settings.investStdDev, inflation)/100; });
      cashBuckets.forEach(b => { b.realReturn = b.meanReal; }); // fixed, no volatility

      (scenario.windfalls||[]).forEach(w => {
        if (w.age!==age) return;
        if (nonEpfBuckets.length){
          const orderedIds = withdrawalOrder.filter(id=>id!=='epf');
          const targetId = orderedIds.find(id=>nonEpfBuckets.some(b=>b.id===id)) || nonEpfBuckets[0].id;
          const bucket = nonEpfBuckets.find(b=>b.id===targetId) || nonEpfBuckets[0];
          bucket.balance += (w.amount||0);
        } else epfBal += (w.amount||0);
      });

      const monthlyExpense = scenario.expenseDetailMode ? detailedMonthlyExpenseAt(scenario, profile, age, inflation) : phaseValueAt(scenario.expensePhases, age, 'monthlyExpense');
      const monthlyIncome = phaseValueAt(scenario.incomePhases, age, 'monthlyIncome');
      const annualExpense = monthlyExpense*12, annualOtherIncome = monthlyIncome*12;
      const standardTarget = (annualExpense-annualOtherIncome)*multiple;
      const fireTarget = scenario.goalEnabled ? scenario.goalAmount : standardTarget;

      const oneTimeCostRow = (scenario.oneTimeCosts||[]).find(c=>c.age===age);
      const oneTimeCostAmt = oneTimeCostRow ? (oneTimeCostRow.amount||0) : 0;
      const travelActive = !!(travelCfg.enabled && age>=(travelCfg.startAge??startAge) && (travelCfg.endAge===null||travelCfg.endAge===undefined||travelCfg.endAge==='' || age<=travelCfg.endAge));
      const travelAmt = travelActive ? (travelCfg.amount||0) : 0;
      const oneOffTotal = oneTimeCostAmt + travelAmt;

      let shortfall = 0;
      if (phase==='accumulation'){
        const activeBreak = (scenario.careerBreaks||[]).find(b => age>=b.startAge && age<b.endAge);
        const resumingBreak = (scenario.careerBreaks||[]).find(b => b.endAge===age);
        const salaryThisYear = activeBreak ? (activeBreak.salaryDuringBreak||0) : currentSalary;
        const annualEpfContribution = salaryThisYear*((profile.epfEmployeePct+profile.epfEmployerPct)/100)*epfContribMonths;
        if (oneOffTotal>0) shortfall = drawFrom(nonEpfBuckets, oneOffTotal);
        epfBal = epfBal*(1+rEpf*yf) + annualEpfContribution*(1+rEpf*avgDivFactor(epfContribMonths));
        nonEpfBuckets.forEach(b => { b.balance = b.balance*Math.pow(1+b.realReturn, yf) + (isCoast?0:b.monthlyContribution*12*yf); });
        if (!activeBreak){
          if (resumingBreak && resumingBreak.resumeAt==='reduced') currentSalary *= (1-(resumingBreak.reducedByPct||0)/100);
          currentSalary *= Math.pow(1+salaryGrowth, yf);
        }
      } else if (phase==='bridge'){
        const baristaActive = isBarista && age<scenario.baristaEndAge;
        const baristaMonthlyEff = isBarista ? scenario.baristaIncome : 0;
        const netW = Math.max(annualExpense-annualOtherIncome-(baristaActive?baristaMonthlyEff*12:0),0)*yf + oneOffTotal;
        shortfall = drawFrom(nonEpfBuckets, netW);
        epfBal = epfBal*(1+rEpf*yf);
        nonEpfBuckets.forEach(b => { b.balance = b.balance*Math.pow(1+b.realReturn, yf); });
      } else {
        const baristaActive = isBarista && age<scenario.baristaEndAge;
        const baristaMonthlyEff = isBarista ? scenario.baristaIncome : 0;
        const netW = Math.max(annualExpense-annualOtherIncome-(baristaActive?baristaMonthlyEff*12:0),0)*yf + oneOffTotal;
        const epfRef = { id:'epf', balance:epfBal, realReturn:rEpf };
        shortfall = drawFrom([epfRef, ...nonEpfBuckets], netW);
        epfBal = epfRef.balance*(1+rEpf*yf);
        nonEpfBuckets.forEach(b => { b.balance = b.balance*Math.pow(1+b.realReturn, yf); });
      }
      if (shortfall>0) everShort = true;
      const combined = epfBal + nonEpfBuckets.reduce((s,b)=>s+b.balance,0);
      combinedSeries.push(combined);
      balancesByAge[idx].push(combined);
    }
    if (!everShort) successCount++;
  }

  function percentile(arr, p){
    const sorted = arr.slice().sort((a,b)=>a-b);
    const idx = Math.min(sorted.length-1, Math.max(0, Math.round((p/100)*(sorted.length-1))));
    return sorted[idx];
  }
  const fan = ages.map((age,idx) => ({
    age,
    p10: percentile(balancesByAge[idx],10),
    p50: percentile(balancesByAge[idx],50),
    p90: percentile(balancesByAge[idx],90),
  }));
  return { successRate: successCount/runs, runs, fan };
}

/* ---- actionable guidance (§4) ---- */
function findExtraContribution(profile, scenario, growthScenario){
  growthScenario = growthScenario || 'conservative';
  const base = project(profile, scenario, growthScenario);
  if (base.achievedAge) return 0;
  const hasInvest = profile.investments && profile.investments.length;
  const hasCash = profile.cashSavings && profile.cashSavings.length;
  if (!hasInvest && !hasCash) return null;
  let lo=0, hi=100000, found=null;
  for (let i=0;i<28;i++){
    const mid=(lo+hi)/2;
    const p2=JSON.parse(JSON.stringify(profile));
    if (hasInvest) p2.investments[0].monthlyContribution += mid; else p2.cashSavings[0].monthlyContribution += mid;
    const r=project(p2, scenario, growthScenario);
    if (r.achievedAge){ hi=mid; found=mid; } else lo=mid;
  }
  return found!==null ? Math.round(found/50)*50 : null;
}
function findRequiredWorkingAge(profile, scenario, growthScenario){
  growthScenario = growthScenario || 'conservative';
  const base = project(profile, scenario, growthScenario);
  if (base.achievedAge) return scenario.workingToAge;
  for (let age=scenario.workingToAge+1; age<=(profile.planToAge||90); age++){
    const sc2 = Object.assign({}, scenario, {workingToAge:age});
    const r = project(profile, sc2, growthScenario);
    if (r.achievedAge) return age;
  }
  return null;
}

/* Scans every growth/return input feeding this scenario and flags anything unusually high to sustain
   for a multi-decade projection — a single mistyped rate (e.g. 100 instead of 10) compounds into a
   number that's easy to miss until it shows up as a startling figure much later in the chart/table. */
function scanUnrealisticAssumptions(profile, scenario){
  const warnings = [];
  const GROWTH_THRESH = 15, RETURN_THRESH = 20;
  const check = (label, pct) => { if (Math.abs(pct||0)>=GROWTH_THRESH) warnings.push(`${label} ${pct}%/yr`); };
  check('Salary growth', profile.salaryGrowthPct);
  if (!scenario.expenseDetailMode) (scenario.expensePhases||[]).forEach((p,i)=>check(`Living cost growth (row ${i+1})`, p.growthPct));
  (scenario.incomePhases||[]).forEach((p,i)=>check(`Other income growth (row ${i+1})`, p.growthPct));
  if (scenario.expenseDetailMode) (scenario.expenseCategories||[]).forEach(c => {
    if (c.type==='flat') check(`"${c.label||'Expense'}" growth`, c.growthPct);
    else if ((c.ratePct||0)>=GROWTH_THRESH) warnings.push(`Mortgage "${c.label||'loan'}" rate ${c.ratePct}%/yr`);
  });
  [['Investment return (Normal)',scenario.rEquityNormal],['Investment return (Conservative)',scenario.rEquityCons],
   ['EPF dividend (Normal)',scenario.rEpfNormal],['EPF dividend (Conservative)',scenario.rEpfCons]].forEach(([label,v]) => {
    if (Math.abs(v||0)>=RETURN_THRESH) warnings.push(`${label} ${v}%/yr`);
  });
  return warnings;
}

/* Plain-English label for the one global switch that controls how every money figure in the app is
   shown: "purchasing power now" (today's money, the default) vs "actual money" (the literal amount

/* In-app modal replacing native confirm()/alert() — sandboxed preview iframes commonly block those,
   which silently no-ops the action (e.g. Delete). This renders its own overlay instead. */
let modalResolve = null;
function closeModal(){
  document.getElementById('modalBackdrop').classList.remove('open');
  document.getElementById('modalBox').classList.remove('open');
}
function showModal(message, {confirmText='OK', cancelText=null} = {}){
  return new Promise(resolve => {
    modalResolve = resolve;
    document.getElementById('modalMsg').textContent = message;
    const actions = document.getElementById('modalActions');
    actions.innerHTML = '';
    if (cancelText){
      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'ghost';
      cancelBtn.textContent = cancelText;
      cancelBtn.addEventListener('click', () => { closeModal(); modalResolve=null; resolve(false); });
      actions.appendChild(cancelBtn);
    }
    const okBtn = document.createElement('button');
    okBtn.className = cancelText ? 'danger-ghost' : 'primary';
    okBtn.textContent = confirmText;
    okBtn.addEventListener('click', () => { closeModal(); modalResolve=null; resolve(true); });
    actions.appendChild(okBtn);
    document.getElementById('modalBackdrop').classList.add('open');
    document.getElementById('modalBox').classList.add('open');
  });
}
function appConfirm(message, confirmText='Confirm'){ return showModal(message, {confirmText, cancelText:'Cancel'}); }
function appAlert(message){ return showModal(message, {confirmText:'OK'}); }

/* Tracks which field Tab is about to move focus to, computed ourselves from a real keydown — rather than
   inferring it from document.activeElement inside a 'change' handler, whose timing relative to the browser's
   own focus-move-on-Tab is inconsistent across browsers/webviews. Without this, a 'change'-triggered re-render
   could grab the wrong (or no) activeId, stranding focus after Tab instead of landing on the next field. */
let pendingFocusId = null;
function focusOrderList(){
  return Array.from(document.querySelectorAll('input:not([disabled]), select:not([disabled]), textarea:not([disabled]), button:not([disabled])'))
    .filter(el => el.tabIndex !== -1 && el.offsetParent !== null);
}
document.addEventListener('keydown', e => {
  if (e.key !== 'Tab') return;
  const active = document.activeElement;
  if (!active) return;
  const order = focusOrderList();
  const idx = order.indexOf(active);
  if (idx===-1) return;
  const nextEl = order[idx + (e.shiftKey ? -1 : 1)];
  pendingFocusId = (nextEl && nextEl.id) ? nextEl.id : null;
}, true);

/* Re-renders while keeping keyboard focus where the user is headed. If a Tab keydown just fired,
   pendingFocusId (computed above, independent of change/blur/focus timing) tells us exactly which
   field is next; otherwise we fall back to whatever currently has focus. We rebuild the DOM, then
   refocus that same id in the new DOM. Without this, wiping innerHTML mid-Tab strands focus, and the
   browser falls back to the first focusable element on the page (a wizard step-dot), which read as
   "Tab jumps to the step buttons" / focus getting lost after typing + Tab. */
function renderViewPreserveFocus(){
  const active = document.activeElement;
  const usingPending = !!pendingFocusId;
  const activeId = pendingFocusId || (active && active.id ? active.id : null);
  const selStart = (!usingPending && activeId && active && 'selectionStart' in active) ? active.selectionStart : null;
  pendingFocusId = null;
  renderView();
  if (activeId){
    const next = document.getElementById(activeId);
    if (next){
      next.focus();
      if (selStart!=null && 'setSelectionRange' in next){ try{ next.setSelectionRange(selStart, selStart); }catch(e){} }
    }
  }
}
