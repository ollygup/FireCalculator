function renderScenarioDashboardBody(el, profile, scenario, normal, cons){
  const achieved = normal.achievedAge && cons.achievedAge;
  const mcResult = scenario.monteCarloEnabled ? runMonteCarlo(profile, scenario, scenario.monteCarloRuns||1000) : null;
  const fy = firstYearRemainingInfo();
  const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const asOfLabel = fy.remainingMonths>0
    ? `Calculated on ${fy.now.getDate()} ${MONTH_NAMES[fy.currentMonth-1]} ${fy.year} — the first row (age ${profile.currentAge}) covers the ${fy.remainingMonths} remaining month${fy.remainingMonths===1?'':'s'} of ${fy.year} (${MONTH_NAMES[fy.currentMonth]}–December), not a full 12. Every row after that is a full year.`
    : `Calculated on ${fy.now.getDate()} ${MONTH_NAMES[fy.currentMonth-1]} ${fy.year} — with the year almost over, the first row (age ${profile.currentAge}) has very little growth applied; the next row starts a full 12-month year.`;
  const asOfNote = `<div class="note" style="margin:0 0 14px;">${asOfLabel}</div>`;
  const assumptionWarnings = scanUnrealisticAssumptions(profile, scenario);
  const assumptionBanner = assumptionWarnings.length ? `<div class="guidance" style="border-left-color:var(--danger); margin-bottom:14px;"><b>Check these assumptions</b> — unusually high to sustain for a multi-decade projection, and will compound into large swings: ${assumptionWarnings.join('; ')}.</div>` : '';
  let goalLine = '';
  if (scenario.goalEnabled && normal.goalCheck && cons.goalCheck){
    const gcN = normal.goalCheck, gcC = cons.goalCheck;
    const standardNow = normal.rows[0].standardTarget;
    const goalBelowStandard = scenario.goalAmount < standardNow;
    const goalRow = (gc, dotClass, label) => `<div class="sub" style="${gc.achieved?'color:var(--good)':'color:var(--danger)'}; margin-top:4px;"><span class="dot ${dotClass}"></span>${label}: ${gc.achieved ? 'On pace — RM'+dispVal(gc.combined, scenario.goalAge, profile.currentAge)+' at that age' : 'Short by RM'+dispVal(gc.gap, scenario.goalAge, profile.currentAge)}</div>`;
    goalLine = `<div class="scard" style="grid-column:1 / -1;"><div class="lbl">Goal check — RM${fmt(scenario.goalAmount)} by age ${scenario.goalAge}</div>
      ${goalRow(gcN,'normal','Normal')}
      ${goalRow(gcC,'cons','Conservative')}
      ${goalBelowStandard?`<div class="sub" style="color:var(--danger); margin-top:4px;">${ICON_WARN}Goal is below the standard ${scenario.swrNormal}% SWR target of RM${fmt(standardNow)} at today's spending — reaching it may not fund a sustainable withdrawal rate.</div>`:''}
      </div>`;
  }
  let guidance = '';
  const guidanceRows = [];
  if (!normal.achievedAge){
    const extraN = findExtraContribution(profile, scenario, 'normal');
    const reqAgeN = findRequiredWorkingAge(profile, scenario, 'normal');
    const partsN = [];
    if (extraN) partsN.push('save an extra <b>RM'+fmt(extraN)+'/month</b>');
    if (reqAgeN && reqAgeN!==scenario.workingToAge) partsN.push('work until age <b>'+reqAgeN+'</b> instead of '+scenario.workingToAge);
    guidanceRows.push(`<div><span class="dot normal"></span><b>Normal case</b>: ${partsN.length?partsN.join(', or '):'no adjustment found within a reasonable range — consider a lower FIRE-type multiple or reduced expenses'}.</div>`);
  }
  if (!cons.achievedAge){
    const extraC = findExtraContribution(profile, scenario, 'conservative');
    const reqAgeC = findRequiredWorkingAge(profile, scenario, 'conservative');
    const partsC = [];
    if (extraC) partsC.push('save an extra <b>RM'+fmt(extraC)+'/month</b>');
    if (reqAgeC && reqAgeC!==scenario.workingToAge) partsC.push('work until age <b>'+reqAgeC+'</b> instead of '+scenario.workingToAge);
    guidanceRows.push(`<div><span class="dot cons"></span><b>Conservative case</b>: ${partsC.length?partsC.join(', or '):'no adjustment found within a reasonable range — consider a lower FIRE-type multiple or reduced expenses'}.</div>`);
  }
  if (guidanceRows.length) guidance = `<div class="guidance"><b>To close the gap</b>:<div style="margin-top:8px; display:flex; flex-direction:column; gap:6px;">${guidanceRows.join('')}</div></div>`;
  const lastN = normal.rows[normal.rows.length-1], lastC = cons.rows[cons.rows.length-1];
  const totalShortN = normal.rows.reduce((s,r)=>s+(r.shortfall||0),0);
  const totalShortC = cons.rows.reduce((s,r)=>s+(r.shortfall||0),0);
  const targetAgeN = normal.achievedAge ?? lastN.age, targetAgeC = cons.achievedAge ?? lastC.age;
  const targetRowN = normal.rows.find(r=>r.age===targetAgeN) || lastN, targetRowC = cons.rows.find(r=>r.age===targetAgeC) || lastC;
  const potLabel = isNominalMode() ? 'Actual money you\'d have at 90' : 'Purchasing power at 90 (in today\'s money)';
  el.innerHTML = `
    ${asOfNote}
    ${assumptionBanner}
    <div class="summary-cards">
      <div class="scard verdict"><div class="headline">${achieved
        ? `On track — reaches its target by age <b>${Math.max(normal.achievedAge,cons.achievedAge)}</b> even under the Conservative case.`
        : `Shortfall — ${normal.achievedAge?'reaches target under Normal assumptions at age '+normal.achievedAge+', but':'does not reach target by 90 under Normal assumptions, and'} does not reach target under Conservative assumptions.`}</div></div>
      <div class="scard"><div class="lbl"><span class="dot normal"></span>Target at age ${targetAgeN} (Normal)</div><div class="val mono">${dispVal(targetRowN.fireTarget, targetAgeN, profile.currentAge)}</div><div class="sub">Conservative: ${dispVal(targetRowC.fireTarget, targetAgeC, profile.currentAge)} at age ${targetAgeC}${scenario.goalEnabled?' (goal-based)':' (standard multiple)'}</div></div>
      <div class="scard"><div class="lbl">Achieved age</div><div class="val mono"><span class="dot normal"></span>${normal.achievedAge??'90+'} &nbsp; <span class="dot cons"></span>${cons.achievedAge??'90+'}</div><div class="sub">Normal vs Conservative</div></div>
      <div class="scard"><div class="lbl">${potLabel}</div><div class="val mono">${dispVal(lastN.combined, lastN.age, profile.currentAge)}</div><div class="sub">Conservative: ${dispVal(lastC.combined, lastC.age, profile.currentAge)}</div></div>
      <div class="scard"><div class="lbl">Depletion risk</div><div class="val mono" style="${cons.depletionAge?'color:var(--danger)':''}">${cons.depletionAge?'Age '+cons.depletionAge:'None to 90'}</div><div class="sub">Normal: ${normal.depletionAge?'Age '+normal.depletionAge:'None to 90'}</div></div>
      ${(totalShortN>0||totalShortC>0) ? `<div class="scard"><div class="lbl">Total missed across the plan (today's money)</div><div class="val mono" style="${totalShortN>0?'color:var(--danger)':''}">${totalShortN>0?'RM'+fmt(totalShortN):'—'}</div><div class="sub">Conservative: ${totalShortC>0?'RM'+fmt(totalShortC):'—'} — sum of every year's own unmet amount, mostly from EPF-locked bridge years; unrelated to a specific row's balance</div></div>` : ''}
      ${goalLine}
    </div>
    ${guidance}
    <div class="chart-wrap">
      <div class="legend">
        <span><span class="sw" style="background:var(--teal)"></span>Combined — Normal</span>
        <span><span class="sw" style="background:var(--gold)"></span>Combined — Conservative</span>
        <span><span class="sw ${scenario.goalEnabled?'goalline':'dashed'}"></span>${scenario.goalEnabled?'Goal target':'FIRE target (standard)'}</span>
        <span class="chart-hint">${isNominalMode()?'Showing the actual money you\'d have at each age':'Showing purchasing power now — what future money is worth in today\'s terms'} — hover / tap a point for details. Switch this at the top of the page.</span>
      </div>
      <div style="position:relative;">${renderChart(scenario,normal,cons)}<div class="tooltip" id="tooltip-${scenario.id}"></div></div>
    </div>
    <div class="section-label">Phase timeline</div>
    ${renderTimeline(profile, scenario)}
    <div class="section-label">Year-by-year breakdown</div>
    ${renderMilestoneTable(profile, scenario,normal,cons)}
    ${scenario.monteCarloEnabled ? renderMonteCarloSection(profile, scenario, mcResult) : ''}
  `;
  setupChartTooltip(el, scenario, normal, cons);
  if (scenario.monteCarloEnabled) setupFanChartTooltip(el, scenario, mcResult.fan, profile.currentAge);
  syncMilestoneHeaderHeights(el);
  window.addEventListener('resize', () => syncMilestoneHeaderHeights(el), {once:true, passive:true});
}

/* ---- chart + tooltip (shared) ---- */
function renderChart(scenario, normal, cons){
  const isMobile = window.innerWidth<=768;
  const w=1080,h=isMobile?420:280,padL=60,padR=20,padT=16,padB=isMobile?40:30;
  const currentAge = normal.rows[0].age;
  const nom = isNominalMode();
  const dv = (v,age) => nom ? toNominal(v, age, currentAge) : v;
  const nRows = normal.rows.map(r=>({age:r.age, combined:dv(r.combined,r.age), fireTarget:dv(r.fireTarget,r.age)}));
  const cRows = cons.rows.map(r=>({age:r.age, combined:dv(r.combined,r.age)}));
  const allVals=[...nRows.map(r=>r.combined),...cRows.map(r=>r.combined),...nRows.map(r=>r.fireTarget),0];
  const maxV=Math.max(...allVals)*1.08, minV=Math.min(0,Math.min(...allVals));
  const ages=nRows.map(r=>r.age);
  const xScale=age=>padL+(age-ages[0])/(Math.max(1,ages[ages.length-1]-ages[0]))*(w-padL-padR);
  const yScale=v=>padT+(1-(v-minV)/(maxV-minV))*(h-padT-padB);
  const pathFor=(rows,key)=>rows.map((r,i)=>`${i===0?'M':'L'}${xScale(r.age).toFixed(1)},${yScale(r[key]).toFixed(1)}`).join(' ');
  const zeroY=yScale(0);
  let ticks='';
  for (let a=ages[0]; a<=ages[ages.length-1]; a+=10){
    const x=xScale(a);
    ticks+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${h-padB}" stroke="#DBD5C5" stroke-width="1"/>`;
    ticks+=`<text x="${x}" y="${h-10}" fill="#6E7260" font-size="${isMobile?12:10}" font-family="IBM Plex Mono" text-anchor="middle">${a}</text>`;
  }
  const targetColor = scenario.goalEnabled ? '#B0293D' : '#6E7260';
  return `<svg id="chart-svg-${scenario.id}" viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; display:block; cursor:crosshair; touch-action:pan-y;"
    data-padl="${padL}" data-padr="${padR}" data-w="${w}" data-age0="${ages[0]}" data-age1="${ages[ages.length-1]}">
    ${ticks}
    <line x1="${padL}" y1="${zeroY}" x2="${w-padR}" y2="${zeroY}" stroke="#DBD5C5" stroke-width="1" stroke-dasharray="2,3"/>
    <path d="${pathFor(nRows,'fireTarget')}" fill="none" stroke="${targetColor}" stroke-width="1.4" stroke-dasharray="5,4" opacity="0.8"/>
    <path d="${pathFor(cRows,'combined')}" fill="none" stroke="#8A5A1A" stroke-width="2"/>
    <path d="${pathFor(nRows,'combined')}" fill="none" stroke="#4A6320" stroke-width="2.4"/>
    <line id="crosshair-${scenario.id}" x1="0" y1="${padT}" x2="0" y2="${h-padB}" stroke="#1E2A17" stroke-width="1" opacity="0" stroke-dasharray="3,3"/>
  </svg>`;
}

function setupChartTooltip(el, scenario, normal, cons){
  const svg = document.getElementById('chart-svg-'+scenario.id);
  const tooltip = document.getElementById('tooltip-'+scenario.id);
  const crosshair = document.getElementById('crosshair-'+scenario.id);
  if (!svg||!tooltip) return;
  const padL=parseFloat(svg.dataset.padl), padR=parseFloat(svg.dataset.padr), vbW=parseFloat(svg.dataset.w);
  const age0=parseFloat(svg.dataset.age0), age1=parseFloat(svg.dataset.age1);
  let pinned = false;

  function showAt(clientX){
    const rect = svg.getBoundingClientRect();
    const scaleX = vbW/rect.width;
    const xPx = (clientX-rect.left)*scaleX;
    let frac = (xPx-padL)/(vbW-padL-padR);
    frac = Math.max(0, Math.min(1, frac));
    const age = Math.round(age0+frac*(age1-age0));
    const idx = age-age0;
    const rn = normal.rows[idx], rc = cons.rows[idx];
    if (!rn||!rc) return;
    const xAtAge = padL+(age-age0)/(age1-age0)*(vbW-padL-padR);
    crosshair.setAttribute('x1',xAtAge); crosshair.setAttribute('x2',xAtAge); crosshair.setAttribute('opacity','0.5');
    tooltip.innerHTML = `
      <div class="t-age"><span>Age ${age} <span class="t-phase">— ${rn.phase}${rn.careerBreak?' · career break':''}</span></span><span class="t-close" data-close-tip="1">✕</span></div>
      <div class="t-row" style="color:var(--muted); font-size:10.5px; margin-bottom:2px;"><span>${isNominalMode()?'Actual money at this age':'Purchasing power now'} — balances are end-of-year, withdrawal is drawn at the start</span></div>
      <div class="t-row"><span>Monthly expense</span><span>${dispVal(rn.monthlyExpense, age, age0)}</span></div>
      ${rn.salary>0?`<div class="t-row"><span>Salary${rn.careerBreak?' (break)':''}</span><span>${dispVal(rn.salary, age, age0)}</span></div>`:''}
      ${rn.oneOffCost>0?`<div class="t-row"><span>One-off cost this year</span><span>${dispVal(rn.oneOffCost, age, age0)}</span></div>`:''}
      <div class="t-row"><span><span class="dot normal"></span>EPF</span><span>${dispVal(rn.epf, age, age0)}</span></div>
      <div class="t-row"><span><span class="dot normal"></span>Cash</span><span>${dispVal(rn.cash, age, age0)}</span></div>
      <div class="t-row"><span><span class="dot normal"></span>Investments</span><span>${dispVal(rn.invest, age, age0)}</span></div>
      <div class="t-row"><span><span class="dot normal"></span>Combined</span><span>${dispVal(rn.combined, age, age0)}</span></div>
      <div class="t-row"><span><span class="dot normal"></span>Withdrawn this year</span><span>${dispVal(rn.withdrawal, age, age0)}</span></div>
      <div class="t-row"><span><span class="dot cons"></span>EPF</span><span>${dispVal(rc.epf, age, age0)}</span></div>
      <div class="t-row"><span><span class="dot cons"></span>Cash</span><span>${dispVal(rc.cash, age, age0)}</span></div>
      <div class="t-row"><span><span class="dot cons"></span>Investments</span><span>${dispVal(rc.invest, age, age0)}</span></div>
      <div class="t-row"><span><span class="dot cons"></span>Combined</span><span>${dispVal(rc.combined, age, age0)}</span></div>
      <div class="t-row"><span><span class="dot cons"></span>Withdrawn this year</span><span>${dispVal(rc.withdrawal, age, age0)}</span></div>
      <div class="t-row"><span>Target</span><span>${dispVal(rn.fireTarget, age, age0)}</span></div>
      ${rn.shortfall>0?`<div class="t-row" style="color:var(--danger)"><span>${rn.epfLocked?'EPF locked, unmet (Normal)':'Shortfall (Normal)'}</span><span>${dispVal(rn.shortfall, age, age0)}</span></div>`:''}
      ${rc.shortfall>0?`<div class="t-row" style="color:var(--danger)"><span>${rc.epfLocked?'EPF locked, unmet (Cons.)':'Shortfall (Cons.)'}</span><span>${dispVal(rc.shortfall, age, age0)}</span></div>`:''}
    `;
    tooltip.style.opacity='1';
    const wrapRect = svg.parentElement.getBoundingClientRect();
    let left = (clientX-wrapRect.left)+16;
    if (left+220 > wrapRect.width) left = (clientX-wrapRect.left)-236;
    if (left < 0) left = 4;
    tooltip.style.left = left+'px'; tooltip.style.top = '4px';
    const closeBtn = tooltip.querySelector('[data-close-tip]');
    if (closeBtn) closeBtn.addEventListener('click', () => { pinned=false; hide(); });
  }
  function hide(){ tooltip.style.opacity='0'; tooltip.classList.remove('pinned'); crosshair.setAttribute('opacity','0'); }

  svg.addEventListener('mousemove', e => { if (!pinned) showAt(e.clientX); });
  svg.addEventListener('mouseleave', () => { if (!pinned) hide(); });
  svg.addEventListener('click', e => { pinned=true; tooltip.classList.add('pinned'); showAt(e.clientX); });
  svg.addEventListener('touchstart', e => { if (e.touches[0]){ pinned=true; tooltip.classList.add('pinned'); showAt(e.touches[0].clientX); } }, {passive:true});
  svg.addEventListener('touchmove', e => { if (e.touches[0]){ e.preventDefault(); pinned=true; tooltip.classList.add('pinned'); showAt(e.touches[0].clientX); } }, {passive:false});
  document.addEventListener('click', e => { if (pinned && !el.contains(e.target)){ pinned=false; hide(); } });
}

/* ---- Monte Carlo (Advanced): success-probability card + 10th/50th/90th percentile fan chart + table ---- */
function renderMonteCarloSection(profile, scenario, mc){
  const pct = Math.round(mc.successRate*100);
  const color = pct>=80 ? 'var(--good-onforest)' : (pct>=50 ? 'var(--gold-onforest)' : 'var(--danger-onforest)');
  return `
    <div class="section-label">Monte Carlo (Advanced) — ${mc.runs} simulated runs</div>
    <div class="summary-cards" style="margin-bottom:14px;">
      <div class="scard verdict"><div class="headline">Probability of success: <b style="color:${color}">${pct}%</b> of simulated runs never ran short of money through age ${profile.planToAge||90}.</div></div>
    </div>
    <div class="chart-wrap">
      <div class="legend">
        <span><span class="sw" style="background:#3B6EA5"></span>90th percentile</span>
        <span><span class="sw" style="background:#4A6320"></span>Median (50th percentile)</span>
        <span><span class="sw" style="background:#8A5A1A"></span>10th percentile</span>
        <span class="chart-hint">Returns are sampled from a normal distribution each year using the volatility set in Presets &amp; Defaults — hover / tap a point for details.</span>
      </div>
      <div style="position:relative;">${renderFanChart(scenario,mc.fan,profile.currentAge)}<div class="tooltip" id="fantooltip-${scenario.id}"></div></div>
    </div>
    ${renderPercentileTable(profile, mc.fan)}
  `;
}
function renderFanChart(scenario, fan, currentAge){
  const isMobile = window.innerWidth<=768;
  const w=1080,h=isMobile?380:260,padL=60,padR=20,padT=16,padB=isMobile?40:30;
  const nom = isNominalMode();
  const dv = (v,age) => nom ? toNominal(v, age, currentAge) : v;
  const rows = fan.map(r=>({age:r.age, p10:dv(r.p10,r.age), p50:dv(r.p50,r.age), p90:dv(r.p90,r.age)}));
  const allVals=[0]; rows.forEach(r=>{allVals.push(r.p10,r.p50,r.p90);});
  const maxV=Math.max(...allVals)*1.08, minV=Math.min(0,Math.min(...allVals));
  const ages = rows.map(r=>r.age);
  const xScale=age=>padL+(age-ages[0])/(Math.max(1,ages[ages.length-1]-ages[0]))*(w-padL-padR);
  const yScale=v=>padT+(1-(v-minV)/(maxV-minV))*(h-padT-padB);
  const zeroY=yScale(0);
  let ticks='';
  for (let a=ages[0]; a<=ages[ages.length-1]; a+=10){
    const x=xScale(a);
    ticks+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${h-padB}" stroke="#DBD5C5" stroke-width="1"/>`;
    ticks+=`<text x="${x}" y="${h-10}" fill="#6E7260" font-size="${isMobile?12:10}" font-family="IBM Plex Mono" text-anchor="middle">${a}</text>`;
  }
  const bandPath = rows.map((r,i)=>`${i===0?'M':'L'}${xScale(r.age).toFixed(1)},${yScale(r.p90).toFixed(1)}`).join(' ')
    + ' ' + rows.slice().reverse().map(r=>`L${xScale(r.age).toFixed(1)},${yScale(r.p10).toFixed(1)}`).join(' ') + ' Z';
  const pathFor=(key)=>rows.map((r,i)=>`${i===0?'M':'L'}${xScale(r.age).toFixed(1)},${yScale(r[key]).toFixed(1)}`).join(' ');
  return `<svg id="fanchart-svg-${scenario.id}" viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; display:block; cursor:crosshair; touch-action:pan-y;"
    data-padl="${padL}" data-padr="${padR}" data-w="${w}" data-age0="${ages[0]}" data-age1="${ages[ages.length-1]}">
    ${ticks}
    <line x1="${padL}" y1="${zeroY}" x2="${w-padR}" y2="${zeroY}" stroke="#DBD5C5" stroke-width="1" stroke-dasharray="2,3"/>
    <path d="${bandPath}" fill="#4A6320" opacity="0.12" stroke="none"/>
    <path d="${pathFor('p90')}" fill="none" stroke="#3B6EA5" stroke-width="1.6" stroke-dasharray="5,4" opacity="0.9"/>
    <path d="${pathFor('p10')}" fill="none" stroke="#8A5A1A" stroke-width="1.6" stroke-dasharray="5,4" opacity="0.9"/>
    <path d="${pathFor('p50')}" fill="none" stroke="#4A6320" stroke-width="2.4"/>
    <line id="fancrosshair-${scenario.id}" x1="0" y1="${padT}" x2="0" y2="${h-padB}" stroke="#1E2A17" stroke-width="1" opacity="0" stroke-dasharray="3,3"/>
  </svg>`;
}

  document.addEventListener('click', e => { if (pinned && !el.contains(e.target)){ pinned=false; hide(); } });
}
/* Year-by-year 10th/50th/90th percentile table — mirrors the milestone table's sticky-age, bounded-scroll layout. */
function renderPercentileTable(profile, fan){
  const rows = fan.map(r => `<tr>
    <td class="col-age">${r.age}</td>
    <td class="mono">${dispVal(r.p90, r.age, profile.currentAge)}</td>
    <td class="mono">${dispVal(r.p50, r.age, profile.currentAge)}</td>
    <td class="mono">${dispVal(r.p10, r.age, profile.currentAge)}</td>
  </tr>`).join('');
  return `
  <div class="section-label">Percentile breakdown by age</div>
  <div class="table-scroll table-scroll-bounded" style="max-height:50vh;">
  <table><thead><tr>
    <th class="col-age">Age</th><th>90th percentile</th><th>Median (50th)</th><th>10th percentile</th>
  </tr></thead><tbody>${rows}</tbody></table>
  </div>`;
}

function renderTimeline(profile, scenario){
  const start=profile.currentAge, end=profile.planToAge||90, total=end-start;
  const isCoast = scenario.fireType==='Coast';
  const accumEnd = isCoast?start:Math.min(scenario.workingToAge,55);
  const bridgeEnd=55;
  const accumPct=Math.max(0,(accumEnd-start)/total*100);
  const bridgePct=Math.max(0,(Math.min(bridgeEnd,end)-Math.max(accumEnd,start))/total*100);
  const decumPct=Math.max(0,100-accumPct-bridgePct);
  const decumStart = bridgePct>0 ? bridgeEnd : accumEnd;
  const segs = [];
  if (accumPct>0) segs.push({color:'var(--teal)', label:'Accumulation', range:start+' – '+accumEnd});
  if (bridgePct>0) segs.push({color:'var(--danger)', label:'Bridge (EPF locked)', range:accumEnd+' – '+bridgeEnd});
  if (decumPct>0) segs.push({color:'var(--gold)', label:'Decumulation', range:decumStart+' – '+end});
  return `<div class="timeline">
    ${accumPct>0?`<div class="phase-accum" style="width:${accumPct}%">Accumulation</div>`:''}
    ${bridgePct>0?`<div class="phase-bridge" style="width:${bridgePct}%">Bridge (EPF locked)</div>`:''}
    ${decumPct>0?`<div class="phase-decum" style="width:${decumPct}%">Decumulation</div>`:''}
  </div>
  <div class="timeline-stack">
    ${segs.map(s=>`<div class="ts-row"><span class="ts-dot" style="background:${s.color}"></span><span class="ts-label">${s.label}</span><span class="ts-range">${s.range}</span></div>`).join('')}
  </div>
  <div class="note">Age ${start} → ${accumEnd>start?accumEnd:start}${accumEnd>start?' accumulation':''}${bridgePct>0?`, then ${accumEnd} → 55 bridge`:''}, then ${decumStart} → ${end} decumulation.</div>`;
}

function renderMilestoneTable(profile, scenario, normal, cons){
  const endAge = profile.planToAge||90;
  const sorted = [];
  for (let a=profile.currentAge; a<=endAge; a++) sorted.push(a);
  const rowsN = Object.fromEntries(normal.rows.map(r=>[r.age,r]));
  const rowsC = Object.fromEntries(cons.rows.map(r=>[r.age,r]));

  // Starting-balance row: exactly what the user entered, before any year has run. Display-only —
  // never fed into achieved/depletion/goal logic, which still runs off project()'s own row series.
  const openingEpf = profile.epfBalance||0;
  const openingCash = (profile.cashSavings||[]).reduce((s,a)=>s+(a.balance||0),0);
  const openingInvest = (profile.investments||[]).reduce((s,a)=>s+(a.currency==='USD'?(a.balance||0)*profile.fxRate:(a.balance||0)),0);
  const startRow = `<tr class="milestone-start">
      <td class="col-age">${profile.currentAge}</td>
      <td colspan="3" style="color:var(--muted);">Starting balance</td>
      <td class="mono">—</td><td class="mono">${dispVal(openingEpf, profile.currentAge, profile.currentAge)}</td><td class="mono">${dispVal(openingCash, profile.currentAge, profile.currentAge)}</td><td class="mono">${dispVal(openingInvest, profile.currentAge, profile.currentAge)}</td><td class="mono">${dispVal(openingEpf+openingCash+openingInvest, profile.currentAge, profile.currentAge)}</td><td class="mono">—</td>
      <td class="mono">—</td><td class="mono">${dispVal(openingEpf, profile.currentAge, profile.currentAge)}</td><td class="mono">${dispVal(openingCash, profile.currentAge, profile.currentAge)}</td><td class="mono">${dispVal(openingInvest, profile.currentAge, profile.currentAge)}</td><td class="mono">${dispVal(openingEpf+openingCash+openingInvest, profile.currentAge, profile.currentAge)}</td><td class="mono">—</td>
    </tr>`;

  let cumShortN=0, cumShortC=0;
  const trs = sorted.map(age => {
    const rn=rowsN[age], rc=rowsC[age];
    const isKey = age===55||age===scenario.workingToAge||age===normal.achievedAge||age===cons.achievedAge||(scenario.goalEnabled&&age===scenario.goalAge);
    // Accumulates only across a continuous run of shortfall years (carried forward + grown at that
    // case's blended return), so back-to-back depleted years — e.g. an EPF-locked bridge stretch —
    // show the running total missed so far. The moment a year is fully covered again, the running
    // total resets to 0: what was missed during a locked stretch is sunk (it was never actually
    // paid, and can't retroactively be), not a debt that should keep following the plan forward.
    cumShortN = rn.shortfall>0 ? cumShortN*(1+(normal.rInvest||0))+rn.shortfall : 0;
    cumShortC = rc.shortfall>0 ? cumShortC*(1+(cons.rInvest||0))+rc.shortfall : 0;
    const statusN = cumShortN>0 ? (rn.epfLocked?'EPF locked — lacks RM'+dispVal(cumShortN, age, profile.currentAge):'Depleted — lacks RM'+dispVal(cumShortN, age, profile.currentAge)) : '—';
    const statusC = cumShortC>0 ? (rc.epfLocked?'EPF locked — lacks RM'+dispVal(cumShortC, age, profile.currentAge):'Depleted — lacks RM'+dispVal(cumShortC, age, profile.currentAge)) : '—';
    // Whole-row text colour: red once the Normal case is short this year (worse), orange once only the
    // Conservative case is short this year. Mutually exclusive — red takes priority.
    const rowClass = rn.shortfall>0 ? 'milestone-fail' : (rc.shortfall>0 ? 'milestone-fail-cons' : '');
    return `<tr class="${isKey?'milestone-key':''} ${rowClass}">
      <td class="col-age">${age}${age===normal.achievedAge?' ★ Normal target hit':''}${age===cons.achievedAge?' ★ Conservative target hit':''}${scenario.goalEnabled&&age===scenario.goalAge?' ◆ goal age':''}</td>
      <td style="text-transform:capitalize;">${rn.phase}${rn.careerBreak?' (break)':''}</td>
      <td class="mono">${rn.salary>0?dispVal(rn.salary, age, profile.currentAge):'—'}</td>
      <td class="mono">${dispVal(rn.monthlyExpense, age, profile.currentAge)}</td>
      <td class="mono">${statusN}</td><td class="mono">${dispVal(rn.epf, age, profile.currentAge)}</td><td class="mono">${dispVal(rn.cash, age, profile.currentAge)}</td><td class="mono">${dispVal(rn.invest, age, profile.currentAge)}</td><td class="mono">${dispVal(rn.combined, age, profile.currentAge)}</td><td class="mono">${dispVal(rn.withdrawal, age, profile.currentAge)}</td>
      <td class="mono">${statusC}</td><td class="mono">${dispVal(rc.epf, age, profile.currentAge)}</td><td class="mono">${dispVal(rc.cash, age, profile.currentAge)}</td><td class="mono">${dispVal(rc.invest, age, profile.currentAge)}</td><td class="mono">${dispVal(rc.combined, age, profile.currentAge)}</td><td class="mono">${dispVal(rc.withdrawal, age, profile.currentAge)}</td>
    </tr>`;
  }).join('');
  const TIP_STATUS = 'Running total of a depleted stretch — accumulates across back-to-back shortfall years, resets to "—" the moment a year is fully covered again (money missed while depleted is sunk, not carried forward as debt).';
  const TIP_BALANCE = 'Balance at the end of this row\'s year — after this year\'s withdrawal and growth.';
  const TIP_WITHDRAWN = 'Withdrawn at the start of this year, before this year\'s growth is applied.';
  return `
  <div class="table-scroll table-scroll-bounded">
  <table><thead>
    <tr><th class="col-age" rowspan="2">Age</th><th rowspan="2">Phase</th><th rowspan="2">Salary</th><th rowspan="2">Monthly<br>expense</th>
      <th class="grp-normal" colspan="6">Normal</th><th class="grp-cons" colspan="6">Conservative</th></tr>
    <tr><th title="${TIP_STATUS}">Status</th><th title="${TIP_BALANCE}">EPF</th><th title="${TIP_BALANCE}">Cash</th><th title="${TIP_BALANCE}">Investments</th><th title="${TIP_BALANCE}">Combined</th><th title="${TIP_WITHDRAWN}">Withdrawn</th><th title="${TIP_STATUS}">Status</th><th title="${TIP_BALANCE}">EPF</th><th title="${TIP_BALANCE}">Cash</th><th title="${TIP_BALANCE}">Investments</th><th title="${TIP_BALANCE}">Combined</th><th title="${TIP_WITHDRAWN}">Withdrawn</th></tr>
  </thead><tbody>${startRow}${trs}</tbody></table>
  </div>`;
}
/* Corrects the row-2 header's sticky "top" offset to the row-1 header's *actual* rendered height
   (measured live in the DOM) instead of a guessed px value. A guessed value that's even slightly
   too small makes the two sticky header rows overlap each other — and, since both are opaque
   sticky layers stacking mid-scroll, the overlap reads as ghosted/see-through text bleeding
   between the header and whatever body row happens to be scrolled underneath at that moment. */
function syncMilestoneHeaderHeights(container){
  container.querySelectorAll('.table-scroll-bounded').forEach(tsb => {
    const row1 = tsb.querySelector('thead tr:first-child');
    if (!row1) return;
    tsb.style.setProperty('--mt-row1-h', row1.getBoundingClientRect().height+'px');
  });
}

async function duplicateScenario(id){
  const s = scenarios.find(ss=>ss.id===id);
  const copy = JSON.parse(JSON.stringify(s));
  scenarioCounter++; copy.id = 'sc'+Date.now()+scenarioCounter;
  copy.name = s.name+' (copy)';
  scenarios.push(copy); await saveScenario(copy); renderView();
}
async function deleteScenarioUi(id){

  scenarios = scenarios.filter(s=>s.id!==id);
  comparePicked = comparePicked.filter(x=>x!==id);
  await dbDelete('scenarios', id);
  renderView();
}

      <div style="font-weight:600; font-size:13px;">${escapeHtml(name)}</div>
      <div style="font-size:11px; color:var(--muted);">${kindLabel}${returnLabel?' · '+returnLabel:''}</div>
    </div>
    <button class="ghost small" data-wd-dir="up" data-wd-idx="${idx}" ${idx===0?'disabled':''} aria-label="Move up">↑</button>
    <button class="ghost small" data-wd-dir="down" data-wd-idx="${idx}" ${idx===total-1?'disabled':''} aria-label="Move down">↓</button>
  </div>`;
}
function renderProfileReview(profile){
  const rows = [
    ['What should we call this profile?', profile.name],
    ['How old are you today?', profile.currentAge],
    ['Plan to what age? (life expectancy)', profile.planToAge],
    ['What is your EPF balance today (RM)?', fmt(profile.epfBalance)],
    ['What is your monthly salary (RM)?', fmt(profile.monthlySalary)],
    ['Employee EPF contribution %?', profile.epfEmployeePct+'%'],
    ['Employer EPF contribution %?', profile.epfEmployerPct+'%'],
    ['What is your expected pay raise, yearly (%)?', profile.salaryGrowthPct+'%'],
  ];
  const cashRows = profile.cashSavings.map(a=>[`Cash/savings: ${a.name}`, fmt(a.balance)+' RM, +'+fmt(a.monthlyContribution)+'/mo'+(a.hasReturn?', '+a.returnOverride+'% return':', no return')]);
  const investRows = profile.investments.map(a=>[`Investment: ${a.name}`, fmt(a.balance)+' '+a.currency+', +'+fmt(a.monthlyContribution)+' RM/mo'+(a.returnOverride!=null?', Normal '+a.returnOverride+'%':', Normal auto')+(a.returnOverrideCons!=null?', Cons '+a.returnOverrideCons+'%':', Cons auto')]);
  rows.push(...cashRows, ...investRows);
  const order = ensureWithdrawalOrder(profile);
  const buckets = allBuckets(profile);
  const orderLabel = order.map(id => id==='epf' ? 'EPF' : (buckets.find(b=>b.id===id)?.name || '(removed)')).join(' → ');
  rows.push(['Withdrawal order (drained top to bottom)', orderLabel]);
  rows.push(["What is today's MYR/USD exchange rate?", profile.fxRate]);
  return wizReviewHtml(rows);
}

function renderProfileWizard(container){
  const profile = profiles.find(p=>p.id===editingProfileId);
  if (!profile){ setView('profiles'); return; }
  if (profile.planToAge===undefined) profile.planToAge=90;
  if (profile.salaryGrowthPct===undefined) profile.salaryGrowthPct=0;
  if (!profile.cashSavings) profile.cashSavings=[];
  if (!profile.investments) profile.investments=[];
  ensureWithdrawalOrder(profile);

  const step = wizardStep;
  let body='';
  if (step===0){
    body = `
      <div class="wiz-q">${field('What should we call this profile?','text','name',profile.name)}</div>
      <div class="wiz-q">${field('How old are you today?','number','currentAge',profile.currentAge)}</div>
      <div class="wiz-q">${field('Plan to what age? (life expectancy)','number','planToAge',profile.planToAge)}</div>
    `;
  } else if (step===1){
    body = `
      <div class="wiz-q">${field('What is your EPF balance today (RM)?','number','epfBalance',profile.epfBalance)}</div>
      <div class="wiz-q">${field('What is your monthly salary (RM)?','number','monthlySalary',profile.monthlySalary)}</div>
      <div class="wiz-q">${field('Employee EPF contribution %?','number','epfEmployeePct',profile.epfEmployeePct)}</div>
      <div class="wiz-q">${field('Employer EPF contribution %?','number','epfEmployerPct',profile.epfEmployerPct)}</div>
      <div class="wiz-q">${field('What is your expected pay raise, yearly (%)?','number','salaryGrowthPct',profile.salaryGrowthPct)}<div class="hint">${growthMultiplierHint(profile.salaryGrowthPct)}</div></div>
    `;
  } else if (step===2){
    body = `
      <p class="note" style="margin-top:0;">Cash, fixed deposits, ASB/ASNB — anything without market risk. Turn off "has a return" for pure cash sitting idle; it will never grow but also never counts against you.</p>
      <div id="cashListHolder">${profile.cashSavings.map(a=>cashRowHtml(a)).join('') || '<div class="note">No cash/savings added yet.</div>'}</div>
      <div class="toolbar" style="margin:10px 0 0;">
        ${CASH_PRESETS.map(p=>`<button class="ghost small add-cash-preset" data-preset-key="${p.key}">+ ${escapeHtml(p.name)}</button>`).join('')}
      </div>
    `;
  } else if (step===3){
    body = `
      <p class="note" style="margin-top:0;">Market-linked investments — equities, unit trusts, ETFs.</p>
      <div id="investListHolder">${profile.investments.map(a=>investRowHtml(a)).join('') || '<div class="note">No investments added yet.</div>'}</div>
      <div class="toolbar" style="margin:10px 0 0;">
        ${INVESTMENT_PRESETS.map(p=>`<button class="ghost small add-invest-preset" data-preset-key="${p.key}">+ ${escapeHtml(p.name)}</button>`).join('')}
      </div>
    `;
  } else if (step===4){
    const order = ensureWithdrawalOrder(profile);
    body = `
      <p class="note" style="margin-top:0;">This is the order buckets get drawn down each year to cover expenses. We've suggested lowest-return-first to preserve growth for longer, but it's entirely your call — some people prefer draining a volatile asset like S&amp;P 500 first, since it's also the one most likely to swing hard in a bad year. Reordering changes your projection.</p>
      <div id="wdOrderHolder">${order.map((id,idx)=>withdrawalOrderRowHtml(id,idx,order.length,profile)).join('')}</div>
    `;
  } else if (step===5){
    const stale = daysSince(profile.fxRateSetAt);
    body = `
      <div class="wiz-q">${field("What is today's MYR/USD exchange rate?",'number','fxRate',profile.fxRate,'0.01')}</div>
      <div class="fx-fresh ${stale!==null&&stale>90?'stale':''}">${stale===null?'Rate freshness not tracked yet.':('Rate set '+stale+' day'+(stale===1?'':'s')+' ago'+(stale>90?' — consider refreshing it.':'.'))}</div>
    `;
  } else if (step===6){
    body = renderProfileReview(profile);
  }

  renderWizardShell(container, {
    title: PROFILE_WIZ_STEPS[step], stepIndex: step, stepLabels: PROFILE_WIZ_STEPS, bodyHtml: body,
    nextLabel: step===PROFILE_WIZ_STEPS.length-1 ? 'Done' : 'Next',
    showDelete: profiles.length>1,
    onJump: (i) => { wizardStep=i; renderView(); window.scrollTo(0,0); },
    onBack: () => { wizardStep=Math.max(0,step-1); renderView(); window.scrollTo(0,0); },
    onNext: () => { if (step===PROFILE_WIZ_STEPS.length-1) setView('dashboard'); else { wizardStep=step+1; renderView(); window.scrollTo(0,0); } },
    onDelete: async () => {
      if (!(await appConfirm('Delete this profile and all its scenarios? This cannot be undone.', 'Delete'))) return;
      const scIds = scenarios.filter(s=>s.profileId===profile.id).map(s=>s.id);
      for (const id of scIds) await dbDelete('scenarios', id);
      scenarios = scenarios.filter(s=>s.profileId!==profile.id);
      await dbDelete('profiles', profile.id);
      profiles = profiles.filter(p=>p.id!==profile.id);
      dashboardFilter = profiles.length>1?'all':(profiles[0]?profiles[0].id:'all');
      setView(profiles.length?'dashboard':'profiles');
    },
  });

  container.querySelectorAll('input[data-field]').forEach(inp => inp.addEventListener('change', () => {
    const f = inp.dataset.field;
    let val = inp.type==='number' ? clampField(f, parseFloat(inp.value)||0) : inp.value;
    if (f==='fxRate' && val!==profile.fxRate) profile.fxRateSetAt = new Date().toISOString();
    profile[f]=val;
    if (f==='currentAge' && profile.planToAge<=val) profile.planToAge = val+1;
    if (f==='planToAge' && val<=profile.currentAge) profile.planToAge = profile.currentAge+1;
    inp.value = profile[f];
    saveProfile(profile);
  }));
  container.querySelectorAll('[data-cash-field]').forEach(inp => inp.addEventListener('change', () => {
    const a = profile.cashSavings.find(x=>x.id===inp.dataset.cashId);
    const f = inp.dataset.cashField;
    if (f==='hasReturn') a.hasReturn = inp.checked;
    else if (f==='name') a.name = inp.value;
    else if (f==='returnOverride') a.returnOverride = inp.value===''?0:clampField('returnOverride', parseFloat(inp.value)||0);
    else a[f] = clampField(f, parseFloat(inp.value)||0);
    saveProfile(profile); renderViewPreserveFocus();
  }));
  container.querySelectorAll('.del-cash-btn').forEach(b => b.addEventListener('click', () => {
    profile.cashSavings = profile.cashSavings.filter(a=>a.id!==b.dataset.cashId); saveProfile(profile); renderView();
  }));
  container.querySelectorAll('.add-cash-preset').forEach(b => b.addEventListener('click', () => {
    const preset = CASH_PRESETS.find(p=>p.key===b.dataset.presetKey);
    assetCounter++;
    profile.cashSavings.push({ id:'c'+assetCounter, name:preset.name, balance:0, monthlyContribution:0, hasReturn:preset.hasReturn, returnOverride:preset.defaultReturn });
    saveProfile(profile); renderView();
  }));
  container.querySelectorAll('[data-inv-field]').forEach(inp => inp.addEventListener('change', () => {
    const a = profile.investments.find(x=>x.id===inp.dataset.invId);
    const f = inp.dataset.invField;
    if (f==='returnOverride' || f==='returnOverrideCons') a[f] = inp.value===''?null:clampField('returnOverride', parseFloat(inp.value)||0);
    else if (f==='name'||f==='currency') a[f]=inp.value;
    else a[f] = clampField(f, parseFloat(inp.value)||0);
    saveProfile(profile);
  }));
  container.querySelectorAll('.del-invest-btn').forEach(b => b.addEventListener('click', () => {
    profile.investments = profile.investments.filter(a=>a.id!==b.dataset.invId); saveProfile(profile); renderView();
  }));
  container.querySelectorAll('.add-invest-preset').forEach(b => b.addEventListener('click', () => {
    const preset = INVESTMENT_PRESETS.find(p=>p.key===b.dataset.presetKey);
    assetCounter++;
    profile.investments.push({ id:'a'+assetCounter, name:preset.name, currency:preset.currency, balance:0, monthlyContribution:0, returnOverride:preset.defaultReturn, returnOverrideCons:null });
    saveProfile(profile); renderView();
  }));
  container.querySelectorAll('[data-wd-dir]').forEach(b => b.addEventListener('click', () => {
    const idx = parseInt(b.dataset.wdIdx);
    const dir = b.dataset.wdDir;
    const order = ensureWithdrawalOrder(profile);
    const swapWith = dir==='up' ? idx-1 : idx+1;
    if (swapWith<0 || swapWith>=order.length) return;
    [order[idx], order[swapWith]] = [order[swapWith], order[idx]];
    profile.withdrawalOrder = order;
    saveProfile(profile); renderView();
  }));
}

/* ============================= Scenario wizard ============================= */
function scenarioWizSteps(scenario){
  const steps = ['Basics','Living costs','Other income'];
  if (scenario.fireType==='Barista') steps.push('Barista income');
  steps.push('Money added','Money removed','Recurring travel','Career breaks','Goal','Assumptions','Monte Carlo (Advanced)','Review');
  return steps;
}
function renderScenarioReview(profile, scenario){
  const cashTotal = (profile.cashSavings||[]).reduce((s,a)=>s+(a.balance||0),0);
  const investTotal = (profile.investments||[]).reduce((s,a)=>s+(a.balance||0),0);
  const order = ensureWithdrawalOrder(profile);
  const buckets = allBuckets(profile);
  const orderLabel = order.map(id => id==='epf' ? 'EPF' : (buckets.find(b=>b.id===id)?.name || '(removed)')).join(' → ');
  const profileRows = [
    ['Profile', profile.name],
    ['Current age → plan to age', profile.currentAge+' → '+(profile.planToAge??90)],
    ['EPF balance / monthly salary', 'RM'+fmt(profile.epfBalance)+' / RM'+fmt(profile.monthlySalary)+' per mo'],
    ['Expected pay raise, yearly (%)', (profile.salaryGrowthPct??0)+'%'],
    ['Cash & savings', (profile.cashSavings||[]).length+' account(s), RM'+fmt(cashTotal)+' total'],
    ['Investments', (profile.investments||[]).length+' asset(s), '+fmt(investTotal)+' total (native currency)'],
    ['Withdrawal order', orderLabel],
    ["MYR/USD rate", profile.fxRate],
  ];
  const rows = [
    ['What should we call this scenario?', scenario.name],
    ['Which FIRE type are you testing?', scenario.fireType],
    ['Until what age will you keep working / contributing?', scenario.workingToAge],
  ];
  (scenario.careerBreaks||[]).forEach(cb=>rows.push([`Career break, age ${cb.startAge}–${cb.endAge}`, 'RM'+fmt(cb.salaryDuringBreak)+'/mo, resume '+(cb.resumeAt==='reduced'?('at −'+(cb.reducedByPct||0)+'%'):'at pre-break salary')]));
  if (scenario.expenseDetailMode){
    (scenario.expenseCategories||[]).forEach(c => {
      if (c.type==='mortgage'){
        const M = mortgagePayment(c.principal, c.ratePct, c.termYears);
        rows.push([`Mortgage: ${c.label||'Home loan'}`, 'RM'+fmt(M)+'/mo'+(c.extraMonthly>0?' +RM'+fmt(c.extraMonthly)+' extra':'')+', from age '+c.startAge+', paid off ~age '+mortgagePayoffAge(c)]);
      } else {
        rows.push([`Expense: ${c.label||'(unlabeled)'}`, 'RM'+fmt(c.monthlyAmount)+'/mo from age '+c.startAge+(c.endAge!=null?' to '+c.endAge:', ongoing')+(c.growthPct?', +'+c.growthPct+'%/yr':'')]);
      }
    });
  } else {
    scenario.expensePhases.forEach(p=>rows.push([`Living cost from age ${p.age}`, fmt(p.monthlyExpense)+'/mo RM'+(p.growthPct?', +'+p.growthPct+'%/yr':'')]));
  }
  scenario.incomePhases.forEach(p=>rows.push([`Other income from age ${p.age}`, fmt(p.monthlyIncome)+'/mo RM'+(p.growthPct?', +'+p.growthPct+'%/yr':'')]));
  if (scenario.fireType==='Barista'){
    rows.push(['Barista income per month (RM)?', fmt(scenario.baristaIncome)]);
    rows.push(['Until what age does barista income continue?', scenario.baristaEndAge]);
  }
  (scenario.windfalls||[]).forEach(w=>rows.push([`Money added at age ${w.age}${w.label?' ('+w.label+')':''}`, '+'+fmt(w.amount)+' RM']));
  (scenario.oneTimeCosts||[]).forEach(c=>rows.push([`Money removed at age ${c.age}${c.label?' ('+c.label+')':''}`, '−'+fmt(c.amount)+' RM']));
  const rt = scenario.recurringTravel||{enabled:false};
  rows.push(['Recurring yearly travel/expense?', rt.enabled ? ('Yes — RM'+fmt(rt.amount)+'/yr, age '+(rt.startAge??'—')+' to '+(rt.endAge!=null&&rt.endAge!==''?rt.endAge:'plan-to age')) : 'No']);
  rows.push(['Use a fixed RM goal?', scenario.goalEnabled?('Yes — RM'+fmt(scenario.goalAmount)+' by age '+scenario.goalAge):'No']);
  rows.push(['Investment return %/yr (nominal), Normal / Conservative', scenario.rEquityNormal+'% / '+scenario.rEquityCons+'%']);
  rows.push(['EPF dividend %/yr (nominal), Normal / Conservative', scenario.rEpfNormal+'% / '+scenario.rEpfCons+'%']);
  rows.push(['Safe withdrawal rate, Normal / Conservative', scenario.swrNormal+'% / '+scenario.swrCons+'%  (≈ '+(100/scenario.swrNormal).toFixed(1)+'× / '+(100/scenario.swrCons).toFixed(1)+'× spend)']);
  rows.push(['Monte Carlo (Advanced)', scenario.monteCarloEnabled ? ('Enabled — '+(scenario.monteCarloRuns||1000)+' runs') : 'Disabled']);
  return `<div class="section-label" style="margin-top:0;">Profile</div>${wizReviewHtml(profileRows)}
    <div class="section-label">Scenario</div>${wizReviewHtml(rows)}`;
}

function renderScenarioWizard(container){
  const scenario = scenarios.find(s=>s.id===editingScenarioId);
  const profile = scenario ? profiles.find(p=>p.id===scenario.profileId) : null;
  if (!scenario || !profile){ setView('dashboard'); return; }
  if (!scenario.windfalls) scenario.windfalls=[];
  if (!scenario.oneTimeCosts) scenario.oneTimeCosts=[];
  if (!scenario.recurringTravel) scenario.recurringTravel = {enabled:false, amount:5000, startAge:null, endAge:null};
  const steps = scenarioWizSteps(scenario);
  if (wizardStep>=steps.length) wizardStep=steps.length-1;
  const stepKey = steps[wizardStep];

  let body='';
  if (stepKey==='Basics'){
    body = `
      <div class="wiz-q"><div class="field"><label for="scProfileSelect">Which profile is this scenario for?</label>
        <select id="scProfileSelect">${profiles.map(p=>`<option value="${p.id}" ${p.id===profile.id?'selected':''}>${escapeHtml(p.name)}</option>`).join('')}</select>
      </div></div>
      <div class="wiz-q">${field('What should we call this scenario?','text','name',scenario.name)}</div>
      <div class="wiz-q">${selectField('Which FIRE type are you testing?','fireType',scenario.fireType, presets.map(p=>p.name))}</div>
      <div class="fire-desc">${FIRE_DESCRIPTIONS[scenario.fireType]||''}</div>
      <div class="wiz-q">${field('Until what age will you keep working / contributing?','number','workingToAge',scenario.workingToAge)}</div>
    `;
  } else if (stepKey==='Living costs'){
    body = `
      <div class="wiz-q"><label class="check-row"><input id="expDetailToggle" type="checkbox" ${scenario.expenseDetailMode?'checked':''}> Configure expenses in detail? (break spending into categories, incl. a mortgage)</label></div>
      ${scenario.expenseDetailMode ? `
        <p class="note" style="margin-top:0;">Add one row per spending category. A mortgage row computes its own fixed monthly payment from principal/rate/term (with an optional extra overpayment to pay it off early) and automatically stops once it's paid off.</p>
        <div id="catHolder">${(scenario.expenseCategories||[]).map((c,idx)=>categoryRowHtml(idx,c)).join('') || '<div class="note">No categories added yet.</div>'}</div>
        <div class="toolbar" style="margin:10px 0 0;">
          <button class="ghost small add-row-btn" id="addFlatCatBtn">+ Add flat expense</button>
          <button class="ghost small add-row-btn" id="addMortgageCatBtn">+ Add mortgage</button>
        </div>
      ` : `
        <p class="note" style="margin-top:0;">Add a row whenever your spending is expected to change.</p>
        <div id="expHolder">${scenario.expensePhases.map((p,idx)=>phaseRowHtml('exp',idx,p,'Monthly expense (MYR)',scenario.expensePhases.length>1)).join('')}</div>
        <button class="ghost small add-row-btn" id="addExpBtn">+ Add expense change</button>
      `}
    `;
  } else if (stepKey==='Other income'){
    body = `
      <p class="note" style="margin-top:0;">Rental, pension, part-time work — anything that offsets expenses.</p>
      <div id="incHolder">${scenario.incomePhases.map((p,idx)=>phaseRowHtml('inc',idx,p,'Monthly income (MYR)',scenario.incomePhases.length>1)).join('')}</div>
      <button class="ghost small add-row-btn" id="addIncBtn">+ Add income change</button>
    `;
  } else if (stepKey==='Barista income'){
    body = `
      <div class="wiz-q">${field('Barista income per month (RM)?','number','baristaIncome',scenario.baristaIncome)}</div>
      <div class="wiz-q">${field('Until what age does barista income continue?','number','baristaEndAge',scenario.baristaEndAge)}</div>
      <div class="wiz-q">${field('Cut applied in the Conservative case (%)?','number','baristaFluctuation',scenario.baristaFluctuation)}</div>
    `;
  } else if (stepKey==='Money added'){
    body = `
      <p class="note" style="margin-top:0;">One-off windfalls — property sale, downsizing, inheritance, bonus. Added straight to your balance at the age you set.</p>
      <div id="windfallHolder">${(scenario.windfalls||[]).map((w,idx)=>windfallRowHtml(idx,w)).join('') || '<div class="note">No money-added events yet.</div>'}</div>
      <button class="ghost small add-row-btn" id="addWindfallBtn">+ Add money added</button>
    `;
  } else if (stepKey==='Money removed'){
    body = `
      <p class="note" style="margin-top:0;">One-off costs — wedding, medical bill, big purchase. Treated as extra spending that year, so it's drawn down through your withdrawal order like normal expenses (and can show up as a shortfall).</p>
      <div id="costHolder">${(scenario.oneTimeCosts||[]).map((c,idx)=>oneTimeCostRowHtml(idx,c)).join('') || '<div class="note">No money-removed events yet.</div>'}</div>
      <button class="ghost small add-row-btn" id="addCostBtn">+ Add money removed</button>
    `;
  } else if (stepKey==='Recurring travel'){
    const rt = scenario.recurringTravel;
    body = `
      <div class="wiz-q"><label class="check-row"><input id="travelEnabled" type="checkbox" ${rt.enabled?'checked':''}> Do you have a recurring yearly expense, like annual travel?</label></div>
      ${rt.enabled?`
      <div class="wiz-q"><div class="field"><label for="travelAmount">Amount per year (RM)</label><input id="travelAmount" type="number" min="0" value="${rt.amount??5000}"></div></div>
      <div class="wiz-q"><div class="field"><label for="travelStartAge">Starting at age</label><input id="travelStartAge" type="number" value="${rt.startAge??scenario.workingToAge}"></div></div>
      <div class="wiz-q"><div class="field"><label for="travelEndAge">Ending at age (optional — leave blank to continue to plan-to age)</label><input id="travelEndAge" type="number" value="${rt.endAge??''}"></div></div>
      `:''}
    `;
  } else if (stepKey==='Career breaks'){
    body = `
      <p class="note" style="margin-top:0;">Advanced — model a sabbatical, unpaid leave, or time out of the workforce. During a break, salary (and EPF contribution, which is derived from salary) drops to whatever you set here — investment/cash contributions you've configured on the profile keep running unless you lower them yourself. On return, choose whether salary picks back up where it would have been anyway, or takes a one-time cut. Skip this step if it doesn't apply to you.</p>
      <div id="cbHolder">${(scenario.careerBreaks||[]).map((cb,idx)=>careerBreakRowHtml(idx,cb)).join('') || '<div class="note">No career breaks added yet.</div>'}</div>
      <button class="ghost small add-row-btn" id="addCbBtn">+ Add career break</button>
    `;
  } else if (stepKey==='Goal'){
    const firstExp = scenario.expenseDetailMode ? detailedMonthlyExpenseAt(scenario, profile, profile.currentAge, settings.inflationPct) : phaseValueAt(scenario.expensePhases, profile.currentAge, 'monthlyExpense');
    const firstInc = phaseValueAt(scenario.incomePhases, profile.currentAge, 'monthlyIncome');
    const standardTargetNow = Math.max(0,(firstExp-firstInc))*12*(100/scenario.swrNormal);
    const goalBelowStandard = scenario.goalEnabled && scenario.goalAmount < standardTargetNow;
    body = `
      <div class="wiz-q"><label class="check-row"><input id="goalEnabled" type="checkbox" ${scenario.goalEnabled?'checked':''}> Use a fixed RM goal instead of the multiple-based target</label></div>
      ${scenario.goalEnabled?`
      <div class="wiz-q">${field('What is your goal amount (RM)?','number','goalAmount',scenario.goalAmount)}</div>
      <div class="wiz-q">${field('By what age do you want to hit it?','number','goalAge',scenario.goalAge)}</div>
      ${goalBelowStandard?`<div class="guidance" style="border-left-color:var(--danger);"><b>Heads up</b> — at today's spending, the standard ${scenario.swrNormal}% SWR target is RM${fmt(standardTargetNow)}. Your goal (RM${fmt(scenario.goalAmount)}) is below that. The goal fully replaces the target used for "achieved age" — hitting it doesn't by itself mean this withdrawal rate is sustainable.</div>`:''}
      `:''}
    `;
  } else if (stepKey==='Assumptions'){
    body = `
      <p class="note" style="margin-top:0;">Defaults are usually fine — only change these if you have a specific view. Rates are nominal; the app converts to real using your inflation assumption of <strong>${settings.inflationPct??3}%/yr</strong> (Presets &amp; Defaults). Safe withdrawal rate (SWR) is how much of your portfolio you draw down each year — the well-known "4% rule" means a 4% SWR, equivalent to a 25× target (multiple = 1 / SWR).</p>
      <div class="scenario-pair">
        <div class="field"><label for="f_rEquityNormal"><span class="dot normal"></span>Investment return %/yr (nominal), Normal</label><input id="f_rEquityNormal" data-field="rEquityNormal" type="number" value="${scenario.rEquityNormal}"><div class="hint">${realHint(scenario.rEquityNormal)}</div></div>
        <div class="field"><label for="f_rEquityCons"><span class="dot cons"></span>Investment return %/yr (nominal), Conservative</label><input id="f_rEquityCons" data-field="rEquityCons" type="number" value="${scenario.rEquityCons}"><div class="hint">${realHint(scenario.rEquityCons)}</div></div>
        <div class="field"><label for="f_rEpfNormal"><span class="dot normal"></span>EPF dividend %/yr (nominal), Normal</label><input id="f_rEpfNormal" data-field="rEpfNormal" type="number" value="${scenario.rEpfNormal}"><div class="hint">${realHint(scenario.rEpfNormal)}</div></div>
        <div class="field"><label for="f_rEpfCons"><span class="dot cons"></span>EPF dividend %/yr (nominal), Conservative</label><input id="f_rEpfCons" data-field="rEpfCons" type="number" value="${scenario.rEpfCons}"><div class="hint">${realHint(scenario.rEpfCons)}</div></div>
        <div class="field"><label for="f_swrNormal"><span class="dot normal"></span>Safe withdrawal rate (%/yr), Normal</label><input id="f_swrNormal" data-field="swrNormal" type="number" step="0.01" value="${scenario.swrNormal}"><div class="hint">${swrHint(scenario.swrNormal)}</div></div>
        <div class="field"><label for="f_swrCons"><span class="dot cons"></span>Safe withdrawal rate (%/yr), Conservative</label><input id="f_swrCons" data-field="swrCons" type="number" step="0.01" value="${scenario.swrCons}"><div class="hint">${swrHint(scenario.swrCons)}</div></div>
      </div>
    `;
  } else if (stepKey==='Monte Carlo (Advanced)'){
    body = `
      <p class="note" style="margin-top:0;">Instead of only Normal vs. Conservative, run the plan hundreds of times with randomly varying investment/EPF returns each year (based on the volatility set in Presets &amp; Defaults) and see the probability your money lasts the whole plan. Adds a probability-of-success card and a 10th/50th/90th percentile chart to this scenario's dashboard report. Everything else about the plan (spending, income, contributions) stays exactly as you've entered it — only investment uncertainty is modelled.</p>
      <div class="wiz-q"><label class="check-row"><input id="mcEnabled" type="checkbox" ${scenario.monteCarloEnabled?'checked':''}> Enable Monte Carlo (Advanced)</label></div>
      ${scenario.monteCarloEnabled?`<div class="wiz-q">${field('Number of simulation runs','number','monteCarloRuns',scenario.monteCarloRuns||1000)}<div class="hint">More runs = smoother percentiles, but slower to compute. 1000 is a good default.</div></div>`:''}
    `;
  } else if (stepKey==='Review'){
    body = renderScenarioReview(profile, scenario);
  }

  renderWizardShell(container, {
    title: stepKey, stepIndex: wizardStep, stepLabels: steps, bodyHtml: body,
    nextLabel: wizardStep===steps.length-1 ? 'Done' : 'Next',
    showDelete: true,
    onJump: (i) => { wizardStep=i; renderView(); window.scrollTo(0,0); },
    onBack: () => { wizardStep=Math.max(0,wizardStep-1); renderView(); window.scrollTo(0,0); },
    onNext: () => { if (wizardStep===steps.length-1) setView('dashboard'); else { wizardStep=wizardStep+1; renderView(); window.scrollTo(0,0); } },
    onDelete: () => deleteScenarioUi(scenario.id),
  });

  const profSelect = document.getElementById('scProfileSelect');
  if (profSelect) profSelect.addEventListener('change', () => {
    scenario.profileId = profSelect.value; saveScenario(scenario); renderView();
  });
  container.querySelectorAll('input[data-field], select[data-field]').forEach(inp => {
    inp.addEventListener('change', () => {
      const f = inp.dataset.field;
      let val = inp.type==='number' ? clampField(f, parseFloat(inp.value)||0) : inp.value;
      if (f==='fireType'){
        scenario.fireType = val;
        const preset = presets.find(pp=>pp.name===val);
        if (preset){ scenario.swrNormal=preset.swrNormal; scenario.swrCons=preset.swrCons; }
      } else scenario[f]=val;
      if (f==='workingToAge' && val<profile.currentAge) scenario.workingToAge = profile.currentAge;
      if (inp.type==='number') inp.value = scenario[f];
      saveScenario(scenario); renderViewPreserveFocus();
    });
  });
  const goalChk = document.getElementById('goalEnabled');
  if (goalChk) goalChk.addEventListener('change', e => { scenario.goalEnabled=e.target.checked; saveScenario(scenario); renderView(); });
  const mcChk = document.getElementById('mcEnabled');
  if (mcChk) mcChk.addEventListener('change', e => { scenario.monteCarloEnabled=e.target.checked; saveScenario(scenario); renderView(); });

  container.querySelectorAll('.del-exp-btn').forEach(b => b.addEventListener('click', () => {

  }));
  const addExpBtn = document.getElementById('addExpBtn');
  if (addExpBtn) addExpBtn.addEventListener('click', () => {
    const last = scenario.expensePhases[scenario.expensePhases.length-1];
    scenario.expensePhases.push({age:last.age+10, monthlyExpense:last.monthlyExpense, growthPct:last.growthPct||0});
    saveScenario(scenario); renderView();
  });
  const expDetailToggle = document.getElementById('expDetailToggle');
  if (expDetailToggle) expDetailToggle.addEventListener('change', e => {
    scenario.expenseDetailMode = e.target.checked; saveScenario(scenario); renderView();
  });
  container.querySelectorAll('[data-cat-field]').forEach(inp => inp.addEventListener('change', () => {
    const idx = parseInt(inp.dataset.catIdx); const f = inp.dataset.catField;
    const cat = scenario.expenseCategories[idx];
    if (f==='type'){
      cat.type = inp.value;
      if (cat.type==='mortgage'){ if (cat.principal===undefined) cat.principal=400000; if (cat.ratePct===undefined) cat.ratePct=4; if (cat.termYears===undefined) cat.termYears=30; if (cat.extraMonthly===undefined) cat.extraMonthly=0; }
      else { if (cat.monthlyAmount===undefined) cat.monthlyAmount=0; }
    } else if (f==='label') cat.label = inp.value;
    else if (f==='endAge') cat.endAge = inp.value===''?null:clampField('age', parseFloat(inp.value)||0);
    else if (f==='principal') cat.principal = clampField('balance', parseFloat(inp.value)||0);
    else if (f==='ratePct') cat.ratePct = clampField('returnOverride', parseFloat(inp.value)||0);
    else if (f==='termYears') cat.termYears = clamp(parseFloat(inp.value)||1, 1, 60);
    else if (f==='startAge') cat.startAge = clampField('age', parseFloat(inp.value)||0);
    else if (f==='extraMonthly') cat.extraMonthly = Math.max(0, parseFloat(inp.value)||0);
    else if (f==='monthlyAmount') cat.monthlyAmount = clampField('monthlyExpense', parseFloat(inp.value)||0);
    else if (f==='growthPct') cat.growthPct = clampField('growthPct', parseFloat(inp.value)||0);
    saveScenario(scenario); renderViewPreserveFocus();
  }));
  container.querySelectorAll('.del-cat-btn').forEach(b => b.addEventListener('click', () => {
    scenario.expenseCategories.splice(parseInt(b.dataset.catIdx),1); saveScenario(scenario); renderView();
  }));
  const addFlatCatBtn = document.getElementById('addFlatCatBtn');
  if (addFlatCatBtn) addFlatCatBtn.addEventListener('click', () => {
    scenario.expenseCategories.push({ type:'flat', label:'', monthlyAmount:0, startAge:profile.currentAge, endAge:null, growthPct:0 });
    saveScenario(scenario); renderView();
  });
  const addMortgageCatBtn = document.getElementById('addMortgageCatBtn');
  if (addMortgageCatBtn) addMortgageCatBtn.addEventListener('click', () => {
    scenario.expenseCategories.push({ type:'mortgage', label:'Home loan', principal:400000, ratePct:4, termYears:30, startAge:profile.currentAge, extraMonthly:0 });
    saveScenario(scenario); renderView();
  });
  container.querySelectorAll('[data-inc-field]').forEach(inp => inp.addEventListener('change', () => {
    const f = inp.dataset.incField;
    scenario.incomePhases[parseInt(inp.dataset.incIdx)][f] = clampField(f, parseFloat(inp.value)||0); saveScenario(scenario);
  }));
  container.querySelectorAll('.del-inc-btn').forEach(b => b.addEventListener('click', () => {
    if (scenario.incomePhases.length>1){ scenario.incomePhases.splice(parseInt(b.dataset.incIdx),1); saveScenario(scenario); renderView(); }
  }));
  const addIncBtn = document.getElementById('addIncBtn');
  if (addIncBtn) addIncBtn.addEventListener('click', () => {
    const last = scenario.incomePhases[scenario.incomePhases.length-1];
    scenario.incomePhases.push({age:last.age+10, monthlyIncome:last.monthlyIncome, growthPct:last.growthPct||0});
    saveScenario(scenario); renderView();
  });
  container.querySelectorAll('[data-cb-field]').forEach(inp => inp.addEventListener('change', () => {
    const idx = parseInt(inp.dataset.cbIdx); const f = inp.dataset.cbField;
    const cb = scenario.careerBreaks[idx];
    if (f==='resumeAt') cb.resumeAt = inp.value;
    else if (f==='startAge'||f==='endAge') cb[f] = clampField('age', parseFloat(inp.value)||0);
    else cb[f] = clampField(f, parseFloat(inp.value)||0);
    if (cb.endAge<=cb.startAge) cb.endAge = cb.startAge+1;
    saveScenario(scenario); renderViewPreserveFocus();
  }));
  container.querySelectorAll('.del-cb-btn').forEach(b => b.addEventListener('click', () => {
    scenario.careerBreaks.splice(parseInt(b.dataset.cbIdx),1); saveScenario(scenario); renderView();
  }));
  const addCbBtn = document.getElementById('addCbBtn');
  if (addCbBtn) addCbBtn.addEventListener('click', () => {
    scenario.careerBreaks.push({ startAge: profile.currentAge+1, endAge: profile.currentAge+2, salaryDuringBreak:0, resumeAt:'same', reducedByPct:0 });
    saveScenario(scenario); renderView();
  });
  container.querySelectorAll('[data-windfall-field]').forEach(inp => inp.addEventListener('change', () => {
    const idx = parseInt(inp.dataset.windfallIdx); const f = inp.dataset.windfallField;
    if (f==='label') scenario.windfalls[idx][f] = inp.value;
    else if (f==='age') scenario.windfalls[idx][f] = clampField('age', parseFloat(inp.value)||0);
    else scenario.windfalls[idx][f] = clampField('amount', Math.abs(parseFloat(inp.value)||0));
    saveScenario(scenario);
  }));
  container.querySelectorAll('.del-windfall-btn').forEach(b => b.addEventListener('click', () => {
    scenario.windfalls.splice(parseInt(b.dataset.windfallIdx),1); saveScenario(scenario); renderView();
  }));
  const addWindfallBtn = document.getElementById('addWindfallBtn');
  if (addWindfallBtn) addWindfallBtn.addEventListener('click', () => {
    scenario.windfalls.push({age: profile.currentAge+10, amount:0, label:''});
    saveScenario(scenario); renderView();
  });
  container.querySelectorAll('[data-cost-field]').forEach(inp => inp.addEventListener('change', () => {
    const idx = parseInt(inp.dataset.costIdx); const f = inp.dataset.costField;
    if (f==='label') scenario.oneTimeCosts[idx][f] = inp.value;
    else if (f==='age') scenario.oneTimeCosts[idx][f] = clampField('age', parseFloat(inp.value)||0);
    else scenario.oneTimeCosts[idx][f] = clampField('amount', Math.abs(parseFloat(inp.value)||0));
    saveScenario(scenario);
  }));
  container.querySelectorAll('.del-cost-btn').forEach(b => b.addEventListener('click', () => {
    scenario.oneTimeCosts.splice(parseInt(b.dataset.costIdx),1); saveScenario(scenario); renderView();
  }));
  const addCostBtn = document.getElementById('addCostBtn');
  if (addCostBtn) addCostBtn.addEventListener('click', () => {
    scenario.oneTimeCosts.push({age: profile.currentAge+10, amount:0, label:''});
    saveScenario(scenario); renderView();
  });
  const travelEnabledChk = document.getElementById('travelEnabled');
  if (travelEnabledChk) travelEnabledChk.addEventListener('change', e => {
    scenario.recurringTravel.enabled = e.target.checked;
    if (scenario.recurringTravel.startAge==null) scenario.recurringTravel.startAge = scenario.workingToAge;
    saveScenario(scenario); renderView();
  });
  const travelAmountInp = document.getElementById('travelAmount');
  if (travelAmountInp) travelAmountInp.addEventListener('change', () => { scenario.recurringTravel.amount = clampField('amount', parseFloat(travelAmountInp.value)||0); saveScenario(scenario); });
  const travelStartInp = document.getElementById('travelStartAge');
  if (travelStartInp) travelStartInp.addEventListener('change', () => { scenario.recurringTravel.startAge = clampField('age', parseFloat(travelStartInp.value)||profile.currentAge); saveScenario(scenario); });
  const travelEndInp = document.getElementById('travelEndAge');
  if (travelEndInp) travelEndInp.addEventListener('change', () => { scenario.recurringTravel.endAge = travelEndInp.value===''?null:clampField('age', parseFloat(travelEndInp.value)||null); saveScenario(scenario); });
}


/* ============================= Compare view ============================= */
function renderCompareView(container){
  if (!profiles.length){ setView('profiles'); return; }
  const compareProfileId = profiles.find(p=>p.id===dashboardFilter) ? dashboardFilter : profiles[0].id;
  const profile = profiles.find(p=>p.id===compareProfileId);
  const profScenarios = scenarios.filter(s=>s.profileId===profile.id);
  container.innerHTML = `
    ${profiles.length>1?`<div class="compare-pick" id="cmpProfilePills">${profiles.map(p=>`<label class="pill-radio"><input type="radio" name="cmpProfile" value="${p.id}" ${p.id===profile.id?'checked':''}> ${escapeHtml(p.name)}</label>`).join('')}</div>`:''}
    <div class="breadcrumb">${escapeHtml(profile.name)} · Compare scenarios</div>
    <div class="section-label">Pick 2 or more scenarios</div>
    <div class="compare-pick">${profScenarios.map(s=>`<label><input type="checkbox" class="cmp-pick" data-scid="${s.id}" ${comparePicked.includes(s.id)?'checked':''}> ${escapeHtml(s.name)}</label>`).join('')}</div>
    <div id="compareResult"></div>
  `;
  const pills = document.getElementById('cmpProfilePills');
  if (pills) pills.querySelectorAll('input[name="cmpProfile"]').forEach(r => r.addEventListener('change', () => { dashboardFilter=r.value; comparePicked=[]; renderCompareView(container); }));
  container.querySelectorAll('.cmp-pick').forEach(b => b.addEventListener('change', () => {
    if (b.checked) comparePicked.push(b.dataset.scid); else comparePicked = comparePicked.filter(id=>id!==b.dataset.scid);
    renderCompareResult(document.getElementById('compareResult'), profile);
  }));
  renderCompareResult(document.getElementById('compareResult'), profile);
}

function renderCompareResult(el, profile){
  const picked = scenarios.filter(s => s.profileId===profile.id && comparePicked.includes(s.id));
  if (picked.length<2){ el.innerHTML = '<div class="note">Select at least 2 scenarios to compare.</div>'; return; }
  const results = picked.map((s,i) => ({ scenario:s, color:CHART_PALETTE[i%CHART_PALETTE.length], normal:project(profile,s,'normal'), cons:project(profile,s,'conservative') }));
  const rows = results.map(r => `<tr>
    <td><span class="sw" style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${r.color};margin-right:6px;"></span>${escapeHtml(r.scenario.name)}</td>
    <td class="mono">${fmt(r.normal.rows[0].fireTarget)}</td>
    <td class="mono">${r.normal.achievedAge??'90+'}</td>
    <td class="mono">${r.cons.achievedAge??'90+'}</td>
    <td class="mono">${dispVal(r.normal.rows[r.normal.rows.length-1].combined, r.normal.rows[r.normal.rows.length-1].age, profile.currentAge)}</td>
    <td class="mono">${dispVal(r.cons.rows[r.cons.rows.length-1].combined, r.cons.rows[r.cons.rows.length-1].age, profile.currentAge)}</td>
    <td class="mono" style="${r.cons.depletionAge?'color:var(--danger)':''}">${r.cons.depletionAge?'Age '+r.cons.depletionAge:'None'}</td>
  </tr>`).join('');
  const potColLabel = isNominalMode() ? 'actual money' : 'purchasing power now';
  el.innerHTML = `
    <div class="table-scroll"><table><thead><tr>
      <th style="text-align:left;">Scenario</th><th>Target today</th><th>Achieved (Normal)</th><th>Achieved (Cons.)</th><th>Pot @90 (Normal)<br><span style="font-weight:400; text-transform:none; font-size:10px;">${potColLabel}</span></th><th>Pot @90 (Cons.)<br><span style="font-weight:400; text-transform:none; font-size:10px;">${potColLabel}</span></th><th>Depletion (Cons.)</th>
    </tr></thead><tbody>${rows}</tbody></table></div>
    <div class="scroll-hint show">← scroll table for more →</div>
    <div class="section-label">Combined pot — Normal case</div>
    <div class="chart-wrap">
      <div class="legend">${results.map(r=>`<span><span class="sw" style="background:${r.color}"></span>${escapeHtml(r.scenario.name)}</span>`).join('')}</div>
      ${renderMultiChart(results.map(r=>({rows:r.normal.rows,color:r.color})), profile.currentAge)}
    </div>
    <div class="section-label">Combined pot — Conservative case</div>
    <div class="chart-wrap">
      <div class="legend">${results.map(r=>`<span><span class="sw" style="background:${r.color}"></span>${escapeHtml(r.scenario.name)}</span>`).join('')}</div>
      ${renderMultiChart(results.map(r=>({rows:r.cons.rows,color:r.color})), profile.currentAge)}
    </div>
  `;
}

function renderMultiChart(series, currentAge){
  const isMobile = window.innerWidth<=768;
  const w=1080,h=isMobile?380:260,padL=60,padR=20,padT=16,padB=isMobile?40:30;
  const nom = isNominalMode();
  const dSeries = series.map(s=>({color:s.color, rows:s.rows.map(r=>({age:r.age, combined: nom?toNominal(r.combined,r.age,currentAge):r.combined}))}));
  const allVals=[0]; dSeries.forEach(s=>s.rows.forEach(r=>allVals.push(r.combined)));
  const maxV=Math.max(...allVals)*1.08, minV=Math.min(0,Math.min(...allVals));
  const ages = dSeries[0].rows.map(r=>r.age);
  const xScale=age=>padL+(age-ages[0])/(Math.max(1,ages[ages.length-1]-ages[0]))*(w-padL-padR);
  const yScale=v=>padT+(1-(v-minV)/(maxV-minV))*(h-padT-padB);
  const zeroY=yScale(0);
  let ticks='';
  for (let a=ages[0]; a<=ages[ages.length-1]; a+=10){
    const x=xScale(a);
    ticks+=`<line x1="${x}" y1="${padT}" x2="${x}" y2="${h-padB}" stroke="#DBD5C5" stroke-width="1"/>`;
    ticks+=`<text x="${x}" y="${h-10}" fill="#6E7260" font-size="${isMobile?12:10}" font-family="IBM Plex Mono" text-anchor="middle">${a}</text>`;
  }
  const paths = dSeries.map(s => {
    const d = s.rows.map((r,i)=>`${i===0?'M':'L'}${xScale(r.age).toFixed(1)},${yScale(r.combined).toFixed(1)}`).join(' ');
    return `<path d="${d}" fill="none" stroke="${s.color}" stroke-width="2.2"/>`;
  }).join('');
  return `<svg viewBox="0 0 ${w} ${h}" style="width:100%; height:auto; display:block;">
    ${ticks}
    <line x1="${padL}" y1="${zeroY}" x2="${w-padR}" y2="${zeroY}" stroke="#DBD5C5" stroke-width="1" stroke-dasharray="2,3"/>
    ${paths}
  </svg>`;
}

/* ============================= Presets & Defaults view ============================= */
function renderPresetsView(container){
  container.innerHTML = `

        <div class="field"><label for="pnorm_${p.name}">Safe withdrawal rate (%/yr), Normal case?</label><input id="pnorm_${p.name}" data-preset-name="${p.name}" data-preset-field="swrNormal" type="number" step="0.01" value="${p.swrNormal}"><div class="hint">${swrHint(p.swrNormal)}</div></div>

        ${p.isCustom ? `<button class="row-del del-preset-btn" data-preset-name="${p.name}">Remove</button>` : '<span></span>'}
      </div>`).join('')}</div>
    <button class="ghost small add-row-btn" id="addPresetBtn">+ Add custom preset</button>

    <div class="section-label">Default assumptions for new profiles/scenarios</div>
    <div class="grid">
      ${field('What should the default MYR/USD rate be?','number','fxRate',settings.fxRate,'0.01')}
      ${field('What inflation rate should we assume, per year?','number','inflationPct',settings.inflationPct??3)}
      ${field('What Normal-case investment return %/yr (nominal)?','number','rEquityNormal',settings.rEquityNormal)}
      ${field('What Conservative-case investment return %/yr (nominal)?','number','rEquityCons',settings.rEquityCons)}
      ${field('What Normal-case EPF dividend %/yr (nominal)?','number','rEpfNormal',settings.rEpfNormal)}
      ${field('What Conservative-case EPF dividend %/yr (nominal)?','number','rEpfCons',settings.rEpfCons)}

      ${field('EPF dividend volatility — std dev %/yr (for Monte Carlo)','number','epfStdDev',settings.epfStdDev??1.5)}
    </div>
    <div class="note">Volatility (std dev) controls how much a return can swing year to year in the Monte Carlo (Advanced) mode on a scenario — it doesn't affect the Normal/Conservative projections. S&amp;P 500 has historically swung by around 15%/yr; EPF's dividend is smoothed and much steadier, around 1.5%/yr. Cash/FD/ASB accounts are treated as fixed (0% volatility) since their returns are guaranteed.</div>
    <div class="note">All return/dividend rates above are <strong>nominal</strong> (actual quoted rates) and don't include inflation — the app converts them to real terms using the inflation assumption before projecting, so everything shown elsewhere stays in today's MYR. These only prefill new profiles/scenarios — editing them doesn't change ones you've already created.</div>
  `;
  container.querySelectorAll('[data-preset-field]').forEach(inp => inp.addEventListener('change', async () => {
