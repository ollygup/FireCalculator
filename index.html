  });
  container.querySelectorAll('input[data-field]').forEach(inp => inp.addEventListener('change', async () => {
    settings[inp.dataset.field] = clampField(inp.dataset.field, parseFloat(inp.value)||0);
    inp.value = settings[inp.dataset.field];
    await dbPut('settings', settings);
  }));
}

/* ============================= Data view ============================= */
function renderDataView(container){
  container.innerHTML = `
    <div class="section-label">Backup &amp; restore (JSON — round-trips everything: profiles, scenarios, presets, defaults)</div>
    <div class="data-actions">
      <button class="primary" id="exportJsonBtn">Export full backup (.json)</button>
      <label class="ghost" style="display:inline-block; text-align:center; padding:10px 16px; border-radius:6px; border:1px solid var(--line); cursor:pointer;">
        Import backup (.json)<input type="file" accept=".json" id="importJsonInput" style="display:none;">
      </label>
      <button class="danger-ghost" id="clearAllBtn">Clear all local data</button>
    </div>
    <div class="note">JSON backup is the only format that can be re-imported — it preserves every input exactly.</div>

    <div class="section-label" style="margin-top:32px;">Export for Notion (CSV — one-way, computed projection rows)</div>
    <div class="data-actions">
      <button class="ghost" id="exportCsvBtn">Export projection CSV</button>
    </div>
    <div class="note">One row per profile × scenario × pot type (EPF / Investments / Combined) × age, Normal and Conservative side by side. This is derived output, not inputs — it can't be imported back, only dragged into a new Notion database for a chart.</div>
  `;
  document.getElementById('exportJsonBtn').addEventListener('click', exportJson);
  document.getElementById('importJsonInput').addEventListener('change', importJson);
  document.getElementById('clearAllBtn').addEventListener('click', clearAllData);
  document.getElementById('exportCsvBtn').addEventListener('click', exportCsv);
}

function exportJson(){
  const payload = { version:2, exportedAt:new Date().toISOString(), profiles, scenarios, presets, settings };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='fire-calculator-backup.json'; a.click();
  URL.revokeObjectURL(url);
}
function importJson(e){
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = async ev => {
    try{
      const data = JSON.parse(ev.target.result);
      if (!data.profiles || !Array.isArray(data.profiles) || !data.scenarios || !Array.isArray(data.scenarios)) throw new Error('Invalid backup file (expects v2 profiles/scenarios format)');
      if (!(await appConfirm(`Import ${data.profiles.length} profile(s) and ${data.scenarios.length} scenario(s)? This replaces all current data.`, 'Import'))) return;
      await dbClear('profiles'); await dbClear('scenarios'); await dbClear('presets'); await dbClear('settings');
      for (const p of data.profiles) await dbPut('profiles', p);
      for (const s of data.scenarios) await dbPut('scenarios', s);
      for (const p of (data.presets||SEED_PRESETS)) await dbPut('presets', p);
      await dbPut('settings', data.settings || SEED_SETTINGS);
      profiles = await dbGetAll('profiles'); scenarios = await dbGetAll('scenarios'); presets = await dbGetAll('presets'); settings = (await dbGetAll('settings'))[0];
      dashboardFilter = profiles.length>1?'all':(profiles[0]?profiles[0].id:'all');
      await appAlert('Import complete.');
      setView('dashboard');
    } catch(err){ await appAlert('Could not import: '+err.message); }
  };
  reader.readAsText(file);
}
async function clearAllData(){
  if (!(await appConfirm('This deletes all profiles, scenarios, presets, and defaults from this browser permanently. Continue?', 'Clear all data'))) return;
  await dbClear('profiles'); await dbClear('scenarios'); await dbClear('presets'); await dbClear('settings');
  for (const p of SEED_PRESETS) await dbPut('presets', p);
  await dbPut('settings', SEED_SETTINGS);
  const prof = newProfile('My profile');
  await dbPut('profiles', prof);
  const sc = newScenario(prof, 'Regular');
  await dbPut('scenarios', sc);
  profiles = [prof]; scenarios = [sc]; presets = await dbGetAll('presets'); settings = (await dbGetAll('settings'))[0];
  dashboardFilter = prof.id;
  setView('dashboard');
}
function exportCsv(){
  const header = ['Profile','Scenario','FIRE_Type','Pot_Type','Age','Phase','Monthly_Expense_Real','Monthly_Expense_Nominal','Balance_Normal_Real','Balance_Normal_Nominal','Balance_Conservative_Real','Balance_Conservative_Nominal','FIRE_Target_Normal_Real','FIRE_Target_Normal_Nominal','FIRE_Target_Conservative_Real','Withdrawn_Normal_Real','Withdrawn_Normal_Nominal','Withdrawn_Conservative_Real'];
  const lines = [header.join(',')];
  scenarios.forEach(scenario => {
    const profile = profiles.find(p=>p.id===scenario.profileId);
    if (!profile) return;
    const normal = project(profile,scenario,'normal'), cons = project(profile,scenario,'conservative');
    const potTypes = ['EPF','Cash','Investments','Combined'];
    for (let i=0;i<normal.rows.length;i++){
      const rn=normal.rows[i], rc=cons.rows[i];
      potTypes.forEach(pt => {
        const bn = pt==='EPF'?rn.epf:pt==='Cash'?rn.cash:pt==='Investments'?rn.invest:rn.combined;
        const bc = pt==='EPF'?rc.epf:pt==='Cash'?rc.cash:pt==='Investments'?rc.invest:rc.combined;
        const bnNom = toNominal(bn, rn.age, profile.currentAge);
        lines.push([csvSafe(profile.name),csvSafe(scenario.name),scenario.fireType,pt,rn.age,rn.phase,
          Math.round(rn.monthlyExpense),Math.round(toNominal(rn.monthlyExpense,rn.age,profile.currentAge)),
          Math.round(bn),Math.round(bnNom),Math.round(bc),Math.round(toNominal(bc,rc.age,profile.currentAge)),
          Math.round(rn.fireTarget),Math.round(toNominal(rn.fireTarget,rn.age,profile.currentAge)),Math.round(rc.fireTarget),
          Math.round(rn.withdrawal),Math.round(toNominal(rn.withdrawal,rn.age,profile.currentAge)),Math.round(rc.withdrawal)
        ].join(','));
      });
    }
  });
  const blob = new Blob([lines.join('\n')], {type:'text/csv'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href=url; a.download='fire-projection.csv'; a.click();
  URL.revokeObjectURL(url);
}
function csvSafe(s){ s=String(s); return /[",\n]/.test(s) ? '"'+s.replace(/"/g,'""')+'"' : s; }

/* ============================= Help view ============================= */
function renderHelpView(container){
  const exampleScenario = scenarios[0];
  const exampleProfile = exampleScenario ? profiles.find(p=>p.id===exampleScenario.profileId) : null;
  let worked = '';
  if (exampleScenario && exampleProfile){
    const rEpf = exampleScenario.rEpfNormal/100;
    const fy = firstYearRemainingInfo();
    const n1 = fy.remainingMonths, yf1 = n1/12;
    const contribMonths1 = n1+1; // this calendar month's contribution still happens — it just earns no dividend this month
    const avg1 = (contribMonths1-1)/24;
    const contrib1 = exampleProfile.monthlySalary*((exampleProfile.epfEmployeePct+exampleProfile.epfEmployerPct)/100)*contribMonths1;
    const firstYearEpf = exampleProfile.epfBalance*(1+rEpf*yf1) + contrib1*(1+rEpf*avg1);
    const contribFull = exampleProfile.monthlySalary*((exampleProfile.epfEmployeePct+exampleProfile.epfEmployerPct)/100)*12;
    const avgFull = 11/24;
    const nextEpf = firstYearEpf*(1+rEpf) + contribFull*(1+rEpf*avgFull);
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    worked = `
      <p><strong>Worked example</strong>, using "${escapeHtml(exampleProfile.name)}" / "${escapeHtml(exampleScenario.name)}"'s actual numbers, Normal scenario, EPF accumulation year:</p>
      <div class="worked">
EPF balance today: RM${fmt(exampleProfile.epfBalance)}
EPF dividend (Normal): ${exampleScenario.rEpfNormal}%
Monthly salary: RM${fmt(exampleProfile.monthlySalary)}
Contribution rate: ${exampleProfile.epfEmployeePct}% + ${exampleProfile.epfEmployerPct}% = ${exampleProfile.epfEmployeePct+exampleProfile.epfEmployerPct}%

FIRST row only (calculated ${fy.now.getDate()} ${MONTH_NAMES[fy.currentMonth-1]} ${fy.year}):
  Opening balance only grows for the ${n1} month${n1===1?'':'s'} still ahead this year. KWSP's dividend is a
  flat annual rate, spread out by the number of days the money is held, not compounded within the year:
    RM${fmt(exampleProfile.epfBalance)} × (1 + ${exampleScenario.rEpfNormal}% × ${n1}/12)
  This month's (${MONTH_NAMES[fy.currentMonth-1]}'s) contribution still goes in as usual. It just earns no
  dividend this month, same as every month. So ${contribMonths1} contributions land this year, from
  ${MONTH_NAMES[fy.currentMonth-1]} to December:
    RM${fmt(exampleProfile.monthlySalary)} × ${(exampleProfile.epfEmployeePct+exampleProfile.epfEmployerPct)/100} × ${contribMonths1} = RM${fmt(contrib1)}
    Each month's contribution only starts earning dividend the following month, through 31 December.
    Averaged across ${contribMonths1} contributions, that works out to about ${(avg1*100).toFixed(1)}% of the annual rate:
    RM${fmt(contrib1)} × (1 + ${exampleScenario.rEpfNormal}% × ${avg1.toFixed(4)})
  = RM${fmt(firstYearEpf)}

EVERY row after that is a full January to December year, using the same logic. 12 contributions average
out to 11/24, or about 45.8% of the rate:
  RM${fmt(firstYearEpf)} × (1 + ${exampleScenario.rEpfNormal}%) + RM${fmt(contribFull)} × (1 + ${exampleScenario.rEpfNormal}% × 11/24)
  = RM${fmt(nextEpf)}
      </div>`;
  }
  container.innerHTML = `
    <div class="help-block">
      <h3>How EPF dividends are estimated</h3>
      <p><strong>What KWSP actually does:</strong> KWSP calls this the "Modified Aggregate Daily Balance" method. Each month's contribution only starts earning dividend from the end of that month. It keeps earning dividend all the way until 31 December. This means a January contribution earns close to a full year of dividend, while a December contribution earns almost none that year.</p>
      <p><strong>How this app follows it:</strong> The app uses the same rule for your EPF contributions. It works out how many months you contributed for that year, then averages the dividend across those months.</p>
      <p><strong>Where it can differ from KWSP's calculator:</strong> The app only knows your EPF balance as one number. It has no record of when that money was actually deposited. If you calculate partway through the year, say in June, the app assumes your whole existing balance only starts earning dividend from today. In reality, most of that balance has usually been sitting there since before this year started, and is owed close to a full year's dividend. Because of this, the app's first-year number can come out lower than KWSP's own calculator if you already have an EPF balance. A brand-new EPF account is not affected by this. We cannot reliably tell an old balance apart from a new account using a single number, and job or pay changes over the years would only make guessing worse. So this is left as a known limitation rather than a guess.</p>
      <p class="note" style="margin-top:14px;">Based on KWSP's published dividend rules as of 14 July 2026. KWSP can change how dividends are calculated at any time, so if this app's numbers drift further from KWSP's calculator than described here, this is the first place to check.</p>
    </div>

    <div class="help-block">
      <h3>Profile vs Scenario</h3>
      <p>A <strong>Profile</strong> stores facts about a person: age, EPF, salary, cash, investments, and exchange rate. You enter it once. A <strong>Scenario</strong> is a plan you test on top of that profile: your FIRE type, the age you plan to stop working, how your spending changes, and any goal you set. One person can have several scenarios, for example a lean plan next to a comfortable one, without re-entering the same numbers each time. Changing something on the profile updates every scenario built on it straight away.</p>
    </div>

    <div class="help-block">
      <h3>How return rates are adjusted for inflation</h3>
      <p>Return and dividend rates for cash accounts, investments, and EPF are entered as the plain number you would actually see quoted. For example, the S&amp;P 500's long-run return of around 10.5% a year, EPF's declared dividend, or 0% for idle cash. Prices rise every year, so a quoted return overstates how much richer that actually makes you. The app removes inflation from each rate before using it, so everything you see afterwards is shown in today's money.</p>
      <div class="formula">real_rate = ((1 + nominal_rate) / (1 + inflation)) − 1</div>
      <p>The MYR/USD exchange rate is applied once, at today's rate, and is not projected forward. This keeps the currency conversion simple, though it means the app does not try to guess how the exchange rate itself might move over time.</p>
    </div>

    <div class="help-block">
      <h3>Two different kinds of growth rate</h3>
      <p>The app asks for a percentage per year in two different places, and they work differently. Mixing them up is the easiest way to get a confusing result.</p>
      <div class="formula">Returns  (investment return, EPF dividend, cash/FD return, mortgage rate, pay raise)
  entered as the actual quoted number, e.g. "S&amp;P 500 ~10.5%/yr", a 3% raise, EPF's declared dividend
  → the app removes inflation from this automatically before using it (see above)

Growth of spending/income  (living-cost timeline rows, other-income timeline rows, detailed expense categories)
  entered directly in today's money, with no adjustment applied
  0% = stays flat in today's terms; a positive number is genuine growth in what you can afford</div>
      <p>Returns and pay raises are numbers you would already recognise from a fund fact sheet, a bank rate, or an offer letter. You type in that number, and the app handles the inflation adjustment for you. How your spending or income changes over time is a judgement call only you can make, so those numbers are taken exactly as you enter them, already in today's money.</p>
    </div>

    <div class="help-block">
      <h3>Why the "future money" numbers look so big</h3>
      <p>The app does all its calculations using today's MYR value. This means every amount is based on what money can actually buy right now. The future MYR value is only a converted number. It shows what the same amount may look like in the future, after inflation is included.</p>
      <p>For example, a living cost of RM4,500 a month today may become around RM14,700 a month after 40 years, at 3% yearly inflation. This does not mean your lifestyle became three times more expensive. It only means prices are expected to be higher in the future.</p>
      <p>Future MYR numbers can look very large because long-term projections combine investment growth and inflation over many years. Even a small inflation rate becomes significant when it compounds for decades. At 3% inflation, prices become about 5.9 times higher after 60 years. This is why a retirement figure many decades in the future can appear unusually large.</p>
      <p>This is expected behaviour, not a calculation error. A house that was expensive decades ago may look cheap today, because money had a different value in the past. In the same way, a large future number does not mean you will have excessive wealth. It represents the larger amount of ringgit needed to maintain the same purchasing power in the future.</p>
      <p>For retirement planning, the important number is the today's MYR value, because it shows your actual purchasing power. The future MYR value is only a reference, to show what the same amount may look like in your account in the future. Showing an inflated future balance next to today's value can make it look like you have more money than you actually do, so the app shows the future MYR value only next to things you will actually be paying, like your monthly spending, salary, or a one-off cost. It is not shown next to your savings pot or your FIRE target, so the two do not get mixed up. You can switch between today's value and future money using the button at the top of the app.</p>
    </div>

    <div class="help-block">
      <h3>Catching typos in growth rates</h3>
      <p>Every growth-rate field, such as salary, spending, income, or expense categories, shows a small note underneath it. This note shows what the rate turns into after 10 years of compounding, and warns you if the rate looks too high to keep up for decades. Each field also has a hard limit of plus or minus 20% a year, so a typo like entering 100 instead of 10 simply cannot be entered. If your salary, an expense, or your total savings is growing to a number that looks too large, check the individual growth-rate fields feeding into it first. One mistyped rate can turn into a very large gap once it compounds over several decades.</p>
    </div>

    <div class="help-block">
      <h3>The three stages of your plan</h3>
      <div class="formula">Accumulation  (current age → working-to age, unless Coast)
  EPF(t+1)          = EPF(t) × (1 + r_epf × yf) + annual_EPF_contribution × (1 + r_epf × avgFactor)
                      [see "How EPF dividends are estimated" above]
  each cash/investment bucket(t+1) = bucket(t) × (1 + r_bucket)^yf + annual_contribution × yf
  any one-off cost this year is drawn from cash/investment buckets, in your withdrawal order

Bridge  (working-to age → 55, only if working-to age &lt; 55)
  EPF(t+1)     = EPF(t) × (1 + r_epf × yf)               [locked, no contribution, no withdrawal]
  net_withdrawal = max(annual_expense − other_income − barista_income, 0) × yf + one-off costs this year
  drain cash/investment buckets in your withdrawal order until net_withdrawal is covered or all are at 0
  any amount still unmet is a real shortfall — EPF cannot help pre-55

Decumulation  (55 → plan-to age)
  net_withdrawal = max(annual_expense − other_income − barista_income, 0) × yf + one-off costs this year
  drain EPF + every cash/investment bucket, in your withdrawal order, until net_withdrawal is covered or all are at 0
  any amount still unmet is a real shortfall — pot is depleted</div>
      <p>Coast FIRE plans stop new contributions from today onward, but otherwise move through the same three stages. The age you plan to stop working still marks when withdrawals during the bridge stage begin. No balance is ever allowed to drop below zero. EPF, each cash account, and each investment are tracked separately, and money is drawn from them in exactly the order you chose in the withdrawal order step. Nothing happens behind the scenes. If every account runs dry and there is still money owed that year, it is recorded as a <strong>shortfall</strong> for that year, either because EPF is still locked before age 55, or because the pot itself has run out from age 55 onward. It is never shown as an impossible negative balance.</p>
    </div>

    <div class="help-block">
      <h3>Withdrawal order</h3>
      <p>Every profile has its own withdrawal order. This is the exact sequence your money gets drawn from, and you can see and change it on its own step. There is no hidden default. The app suggests draining the lowest-return account first, since that tends to preserve growth for longer, but you are free to reorder it however you like. For example, you could drain a more volatile asset like the S&amp;P 500 first, since that is also the one most likely to swing hard in a bad year. EPF stays in the list too, but it can only actually be drawn from age 55 onward, no matter where you place it, since it is locked by law before that.</p>
    </div>

    <div class="help-block">
      <h3>How spending and income change over time</h3>
      <div class="formula">value_at(age) = row.value × (1 + row.growthPct/100) ^ (age − row.age)
  where "row" is the latest timeline row with row.age ≤ age</div>
      <p>Each spending or income row can carry its own yearly growth rate. This keeps compounding from that row's starting age until the next row takes over, or until your plan-to age if it is the last row. Leave it at 0% for a flat, unchanging amount.</p>
    </div>

    <div class="help-block">
      <h3>Detailed expenses &amp; mortgage</h3>
      <p>By default, "Living costs" is a single monthly number per row. Turning on "Configure expenses in detail?" lets you break that down into separate categories instead, such as flat expenses like rent or groceries, and a mortgage if you have one. These are added up each year to produce the same monthly figure the rest of the app uses. Nothing else about the projection changes. This only changes how that one number is built.</p>
      <div class="formula">Mortgage payment (standard amortization):
  M = P × r(1+r)^n / ((1+r)^n − 1)     r = nominal rate/12, n = term in months, P = principal

Payoff age with an optional extra monthly overpayment:
  simulated year by year — each year, interest = balance × rate, principal_paid = (M + extra) × 12 − interest
  balance -= principal_paid, repeat until balance ≤ 0 → that year is the payoff age
  (extra payments only ever shorten the term, never lengthen it)</div>
      <p>A mortgage payment is a fixed amount in the ringgit of the day it is paid, just like a real mortgage. But everything else in this app is shown in today's money. So each year, that fixed payment is adjusted back down for inflation before it is added to your expenses. A real RM2,500 a month payment becomes a smaller slice of your spending the further out it is projected, which matches what actually happens with a real mortgage over time. The age it gets paid off is worked out once from the loan's own numbers, and does not depend on inflation at all.</p>
    </div>

    <div class="help-block">
      <h3>Cash/savings vs investments</h3>
      <p><strong>Cash/savings</strong> are for money that is not exposed to market ups and downs. This includes everyday cash, fixed deposits, and ASB/ASNB. Each account can either earn no return at all, for plain idle cash, or a return you set yourself. <strong>Investments</strong> are market-linked, such as shares, unit trusts, and ETFs. They always carry a return, which defaults to your scenario's overall investment-return assumption unless you set one for that specific asset. Keeping the two separate means someone who is purely saving in cash is not forced to assume a market return on money that is not actually invested. It also lets the app draw money from your accounts in exactly the order you have chosen.</p>
      <div class="formula">r_invest (display only) = Σ(balance_i × return_i) / Σ(balance_i)     — computed once, at today's balances</div>
      <p>That blended number is shown only for reference, for example in the chart tooltip. It is not what the app actually uses to work out your plan. Behind the scenes, the app always tracks each account's own balance and return separately.</p>
    </div>

    <div class="help-block">
      <h3>Your FIRE target, explained</h3>
      <div class="formula">You set: safe_withdrawal_rate (SWR), e.g. 4%/yr — the well-known "4% rule"
withdrawal_multiple = 1 / SWR                          shown for reference, e.g. 1/4% = 25×
standard_target = (annual_expense − annual_other_income) × withdrawal_multiple
target_used = goal_amount   if a goal is enabled
            = standard_target   otherwise</div>
      <p>Your target is not fixed. It is recalculated from whatever your spending and income timeline says at each age, so it moves if you have planned a downsizing step, a pension starting later, and so on. It leaves out one-off costs and recurring travel on purpose, so a single expensive year does not distort your ongoing target. If you have set a fixed goal amount instead, that goal fully replaces this target for working out when you have reached FIRE. The regular target is still shown alongside it for reference.</p>
      <p>Lean, Regular, and Fat FIRE all use the exact same formula above. They only differ in how much of your pot you draw down each year. Coast, which means no more contributions, and Barista, which means part-time income alongside your pot, are genuinely different strategies, not just a different withdrawal rate. That is what makes them their own separate options.</p>
    </div>

    <div class="help-block">
      <h3>Money added, money removed &amp; recurring travel</h3>
      <p>These are three separate, clearly defined things, rather than one vague "one-off amount" field.</p>
      <div class="formula">Money added (windfall)   — added directly to a bucket balance at the age you set (property sale, inheritance, bonus)
Money removed (cost)     — folded into that year's cash need, then drawn through your withdrawal order (wedding, medical bill)
Recurring travel         — the same, but repeats every year between a start age and an optional end age</div>
      <p>Money added goes straight onto a balance and never affects how money is drawn down. It is simply a top-up, added to the first account in your withdrawal order that still exists. Money removed and recurring travel behave like extra spending for that year. They show up in the "Withdrawn" column and the chart details, and can cause a shortfall just like ordinary living costs can.</p>
    </div>

    <div class="help-block">
      <h3>When you've "made it", and running out of money</h3>
      <div class="formula">achieved_age  = first age where combined_pot ≥ target_used
goal_check    = (combined_pot at goal_age) ≥ goal_amount
depletion_age = first age where that year's withdrawal isn't fully covered (shortfall &gt; 0)
                — balances never go negative themselves; a shortfall is flagged instead, per the phase formulas above</div>
      <p>The plan is calculated from your current age all the way to your <strong>plan-to age</strong>, which is set on your profile and defaults to 90. Every figure is shown in today's money.</p>
    </div>

    <div class="help-block">
      <h3>Closing the gap (guidance)</h3>
      <p>When a plan shows a shortfall in the Conservative case, the app looks for two possible fixes. One is saving some extra amount each month, added to your first-listed investment, to get you back on track by 90. The other is working out how much later you would need to keep working to reach your target at your current savings rate. Depending on your numbers, one, both, or neither of these might realistically close the gap.</p>
    </div>

    <div class="help-block">
      <h3>Monte Carlo (Advanced)</h3>
      <p>The Normal/Conservative view uses one fixed return rate per case. Monte Carlo instead runs your plan hundreds or thousands of times, and each run samples a different investment/EPF return every single year — some years better than assumed, some worse — to show a spread of possible outcomes rather than two fixed lines.</p>
      <div class="formula">Each simulated year, per bucket:
  sampled_return = mean_return + (random standard-normal value × volatility)
  mean_return  = the scenario's Normal-case assumption (investment / EPF)
  volatility   = the std dev %/yr set in Presets &amp; Defaults (default 15% investments, 1.5% EPF)

Probability of success = (runs that never had a shortfall, any year) / total runs</div>
      <p>Everything else about the plan — spending, income, contributions, career breaks, one-off costs, withdrawal order, SWR target — is used exactly as entered in every run. Only investment/EPF return uncertainty is modelled. Cash, fixed deposits, and ASB/ASNB are treated as fixed (0% volatility) since their returns are guaranteed rather than market-linked.</p>
      <p><strong>Stated simplifications:</strong> returns are sampled from a normal (not log-normal) distribution — a reasonable approximation at these magnitudes, though it technically allows a small chance of an unrealistically extreme year. Inflation itself is not randomized, only investment/EPF returns are. Years are also sampled independently — a bad year doesn't make the following year more or less likely to also be bad, which is a simplification of how real markets sometimes cluster.</p>
    </div>

    ${worked ? `<div class="help-block">${worked}</div>` : ''}
  `;
}

init();

</script>
